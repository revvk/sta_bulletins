<?xml version="1.0" encoding="UTF-8"?>
<!--
  Temporary inline SVG of the St. Andrew's ichthys logo mark.
  Follows the brand guide palette (Dark Royal / Royal / Dark Blue /
  Light Blue). To replace with the official PNG export, drop
  logo_color_horizontal.png into web/static/ and update base.html.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img"
     aria-label="St. Andrew's Episcopal Church">
  <circle cx="50" cy="50" r="48" fill="#0F145B"/>
  <!-- Left ichthys -->
  <path d="M 14 50 Q 38 28 62 50 Q 38 72 14 50 Z"
        fill="#40B1E5" stroke="#ffffff" stroke-width="1.4"/>
  <!-- Right ichthys -->
  <path d="M 86 50 Q 62 28 38 50 Q 62 72 86 50 Z"
        fill="#24338A" stroke="#ffffff" stroke-width="1.4"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#ffffff" stroke-width="1.6"/>
</svg>
