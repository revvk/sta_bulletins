# ==========================================================================
# Advent I  (Advent seasonal form - Hope)
# ==========================================================================
advent_I:
  title: "Prayers of the People - Advent I"
  group: advent
  group_label: Advent
  sheet_values:
    - advent (I)
    - advent (1)
  season: "advent"
  theme: "hope"
  elements:
    - type: rubric
      text: >-
        My brothers and sisters, may God strengthen your hearts in
        holiness. Trusting in God, let us pray, "O come, o come,
        Emmanuel; be our hope and salvation."

    - type: leader
      text: >-
        God our hope, make us increase and abound in love for one
        another. Keep your Church on the paths of love and
        faithfulness.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our hope and salvation."

    - type: leader
      text: >-
        God our hope, send your Spirit among the ministries of St.
        Andrew's, especially the {parish_ministries}. Help us be
        stewards of your grace to the world.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our hope and salvation."

    - type: leader
      text: >-
        God our hope, usher in your reign of justice and
        righteousness. May all the world know your peace and
        safety.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our hope and salvation."

    - type: leader
      text: >-
        God our hope, you place signs in the sun, the moon, and the
        stars. Give us eyes to see, the wisdom to prepare, and the
        faith to trust in you.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our hope and salvation."

    - type: leader
      text: >-
        God our hope, under your reign divisions are overcome,
        unity restored: bring the people of this land together in a
        spirit of love and respect.
    - type: rubric
      text: "Silence. The People may add their own thanksgivings."
    - type: people
      text: "O come, o come, Emmanuel; be our hope and salvation."

    - type: leader
      text: >-
        God our hope, remember your compassion and love. Heal and
        restore the sick and the suffering, the anxious and the
        grieving.
    - type: rubric
      text: "Silence. The People may add their own petitions."
    - type: people
      text: "O come, o come, Emmanuel; be our hope and salvation."

    - type: leader
      text: >-
        God our hope, keep us blameless before you that we may meet
        the coming of our Lord Jesus with joy. May we, and all who
        have died {departed}, rise to life immortal with all your
        saints.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our hope and salvation."

# ==========================================================================
# Advent II  (Advent seasonal form - Peace)
# ==========================================================================
advent_II:
  title: "Prayers of the People - Advent II"
  group: advent
  sheet_values:
    - advent (II)
    - advent (2)
  season: "advent"
  theme: "peace"
  elements:
    - type: rubric
      text: >-
        My sisters and brothers, may God fill our hearts with
        peace. Trusting in God, let us pray, "O come, o come,
        Emmanuel; be our peace and salvation."

    - type: leader
      text: >-
        God our peace, make us increase and abound in love for one
        another. Keep your Church on the straight paths of love and
        faithfulness.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our peace and salvation."

    - type: leader
      text: >-
        God our peace, send your Spirit among the ministries of St.
        Andrew's, especially the {parish_ministries}. Help us be
        stewards of your grace to the world.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our peace and salvation."

    - type: leader
      text: >-
        God our peace, usher in your reign of justice and
        righteousness. May guns grow quiet and bombs gather dust.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our peace and salvation."

    - type: leader
      text: >-
        God our peace, you have sent messengers to call us to
        prepare the way of your Son. Give us ears to hear, hearts
        full of repentance for our sins, and eyes to see the
        salvation of our God.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our peace and salvation."

    - type: leader
      text: >-
        God our peace, under your reign divisions are overcome,
        unity restored: bring the people of our divided and
        contentious country together in a spirit of love and
        respect.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our peace and salvation."

    - type: leader
      text: >-
        God our peace, in your tender compassion remember your
        people and set them free. Heal and restore the sick and the
        suffering, the anxious and the grieving.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our peace and salvation."

    - type: leader
      text: >-
        God our peace, may we, and all who have died {departed},
        rise to life immortal with all your saints in the joy of
        your salvation.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our peace and salvation."

# ==========================================================================
# Advent III  (Advent seasonal form - Joy)
# ==========================================================================
advent_III:
  title: "Prayers of the People - Advent III"
  group: advent
  sheet_values:
    - advent (III)
    - advent (3)
  season: "advent"
  theme: "joy"
  elements:
    - type: rubric
      text: >-
        My brothers and sisters, may God fill our hearts with joy.
        Trusting in God, let us pray, "O come, o come, Emmanuel;
        be our joy and salvation."

    - type: leader
      text: >-
        God our joy, make your Church increase and abound in love
        for one another. Restore our fortunes before our eyes, that
        we may rejoice and exalt with all our heart.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our joy and salvation."

    - type: leader
      text: >-
        God our joy, send your Spirit among the ministries of St.
        Andrew's, especially the {parish_ministries}. Let not our
        hands grow weak as we do your work.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our joy and salvation."

    - type: leader
      text: >-
        God our joy, deal mightily with oppressors, enemies and
        disasters. Lift up the innocent and the brokenhearted, and
        remove the world's judgments against the poor, outcast, and
        needy.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our joy and salvation."

    - type: leader
      text: >-
        God our joy, give us grace to bear fruits worthy of
        repentance in our everyday lives and to know the peace and
        freedom of your forgiveness.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our joy and salvation."

    - type: leader
      text: >-
        God our joy, guard the hearts and minds of the people of
        this country and guide our leaders, especially our president
        {president}, our governor {governor}, and our mayor {mayor}.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our joy and salvation."

    - type: leader
      text: >-
        God our joy, may we, and all who have died {departed}, rise
        to life immortal in that kingdom where there is no death,
        neither sorrow nor crying, but the fullness of joy with all
        your saints.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our joy and salvation."

# ==========================================================================
# Advent IV  (Advent seasonal form - Love)
# ==========================================================================
advent_IV:
  title: "Prayers of the People - Advent IV"
  group: advent
  sheet_values:
    - advent (IV)
    - advent (4)
  season: "advent"
  theme: "love"
  elements:
    - type: rubric
      text: >-
        My sisters and brothers, may God fill our hearts with love.
        Trusting in God, let us pray, "O come, o come, Emmanuel;
        be our love and salvation."

    - type: leader
      text: >-
        God of love, may your Church believe that there will be a
        fulfillment of what you have spoken to your people through
        the ages, and in remembrance of your mercy, may we magnify
        your name and rejoice in your salvation.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our love and salvation."

    - type: leader
      text: >-
        God of love, may the ministries of St. Andrew's bear
        witness to the Spirit's presence among us, especially the
        {parish_ministries}.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our love and salvation."

    - type: leader
      text: >-
        God of love, lift up the lowly, fill the hungry with good
        things, bind up the brokenhearted, and heal the sick, that
        all your people may live secure to the ends of the earth.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our love and salvation."

    - type: leader
      text: >-
        God of love, may those who rule on earth follow the path of
        your love, rather than giving in to the lusts of the proud,
        mighty and rich.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our love and salvation."

    - type: leader
      text: >-
        God of love, fill our cities and community with the power
        of your Holy Spirit in this season. May unity triumph over
        division, hope shatter despair, peace trample anxiety, and
        love conquer hate.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our love and salvation."

    - type: leader
      text: >-
        God of love, bless those who have died in the faith of
        Christ and those whose faith is known to you alone
        {departed}. Hold in your strong arms of love those among us
        who grieve deeply their passing.
    - type: rubric
      text: "Silence"
    - type: people
      text: "O come, o come, Emmanuel; be our love and salvation."

# ==========================================================================
# The Second Sunday of Easter
# ==========================================================================
easter_II:
  title: "Prayers of the People - The Second Sunday of Easter"
  group: easter
  sheet_values:
    - easter (II)
    - easter (2)
  season: "easter"
  elements:
    - type: leader
      text: >-
        Grace to you and peace from Jesus Christ, the firstborn of
        the dead. The Lord has acted; let us rejoice and be glad,
        saying, "You are our God; and we thank you."

    - type: leader
      text: >-
        Almighty God, you have given your Church the ministry of
        reconciliation: grant that all who have been reborn into
        the fellowship of Christ's Body may show forth in their
        lives what they profess by their faith.
    - type: rubric
      text: "Silence"
    - type: people
      text: "You are our God; and we thank you."

    - type: leader
      text: >-
        Ruler of the kings of the earth, Lord Jesus, your word is a
        word of peace: speak forth salvation in a weary world.
    - type: rubric
      text: "Silence"
    - type: people
      text: "You are our God; and we thank you."

    - type: leader
      text: >-
        All you do, O Lord, is marvelous in our eyes: give us a
        respect for all you have made.
    - type: rubric
      text: "The congregation may add their thanksgivings."
    - type: people
      text: "You are our God; and we thank you."

    - type: leader
      text: >-
        Mighty Savior, raise up faithful witnesses in our
        community, that our neighbors might come to know that you
        love them and have freed them from the power of sin.
    - type: rubric
      text: "Silence"
    - type: people
      text: "You are our God; and we thank you."

    - type: leader
      text: >-
        O Lord, you are good; your mercy endures forever: be the
        strength of the weak and the song of those who mourn.
    - type: rubric
      text: "The congregation may add their petitions."
    - type: people
      text: "You are our God; and we thank you."

    - type: leader
      text: >-
        Alpha and Omega, you do not hand your beloved ones over to
        death, but promise life eternal {departed} to all those
        baptized into your Son: to you be the glory and dominion
        forever.
    - type: rubric
      text: "Silence"
    - type: people
      text: "You are our God; and we thank you."

# ==========================================================================
# The Third Sunday of Easter
# ==========================================================================
easter_III:
  title: "Prayers of the People - The Third Sunday of Easter"
  group: easter
  sheet_values:
    - easter (III)
    - easter (3)
  season: "easter"
  elements:
    - type: leader
      text: >-
        Brothers and sisters, give thanks to the One who clothes us
        with joy. The Lord is our helper and restorer; therefore,
        let us pray, "Hear, O Lord, and have mercy upon us."

    - type: leader
      text: >-
        O God, you have chosen your Church to bring your name
        before all nations: give us hearts to feed your lambs and
        tend your sheep. Give us hearts to follow Jesus.
    - type: rubric
      text: "Silence"
    - type: people
      text: "Hear, O Lord, And have mercy upon us."

    - type: leader
      text: >-
        Lord Christ, we look for the day when all will live
        together in peace, when every voice will together sing this
        hymn: to the one seated on the throne and to the Lamb be
        blessing and honor and glory and might forever and ever!
    - type: rubric
      text: "Silence"
    - type: people
      text: "Hear, O Lord, And have mercy upon us."

    - type: leader
      text: >-
        Creator of the deep, protect and preserve our lakes,
        rivers, and oceans, and all creatures who live therein. May
        we be good stewards of the gift of water.
    - type: rubric
      text: "Silence. The congregation may add their thanksgivings"
    - type: people
      text: "Hear, O Lord, And have mercy upon us."

    - type: leader
      text: >-
        Ancient of Days, we pray for the senior members of our
        community. Bless with patience and confidence those who
        rely on others for support, care, and transportation. Bless
        their caretakers with strength.
    - type: rubric
      text: "Silence"
    - type: people
      text: "Hear, O Lord, And have mercy upon us."

    - type: leader
      text: >-
        O Lord our God, restore to health those who cry out to you.
        Lift up the lowly. Turn wailing into joyful dancing.
    - type: rubric
      text: "Silence. The congregation may add their own petitions."
    - type: people
      text: "Hear, O Lord, And have mercy upon us."

    - type: leader
      text: >-
        Living God, you restore the life of those in the grave: may
        we, and all the dead, experience resurrection {departed}
        and life everlasting.
    - type: rubric
      text: "Silence"
    - type: people
      text: "Hear, O Lord, And have mercy upon us."

# ==========================================================================
# Mother's Day
# ==========================================================================
mothers_day:
  title: "Prayers of the People - Mother's Day"
  group: special
  group_label: Special Occasions
  sheet_values:
    - mother's day
    - mothers day
    - mothers_day
  season: "special"
  # The form's elements include a built-in concluding collect
  # ("Loving God, as a mother gives life and nourishment…"), so the
  # builder should NOT append the default
  # "The Celebrant concludes with a suitable Collect." rubric. An
  # empty string here tells the renderer to skip that rubric.
  concluding_rubric: ""
  elements:
    - type: leader
      text: >-
        On this day we give you thanks for those women who have
        given us life, those who have loved us, those who have
        sacrificed for us, and those who have taught us. May your
        blessing be upon the women who gave us birth, and all those
        women who have nurtured, taught, comforted, challenged, and
        encouraged us such that without them we would not be who we
        are.
    - type: people
      leader_text: "Lord, in your mercy,"
      people_text: "hear our prayer."

    - type: leader
      text: >-
        We pray for all those who govern and hold power in our
        nation and the world, they would lead in such a way that
        their mothers would be proud, not of their power but of
        their peace, not of their strength but of their justice.
        May this world ever more reflect the love with which you
        created it.
    - type: people
      leader_text: "Lord, in your mercy,"
      people_text: "hear our prayer."

    - type: leader
      text: >-
        As a mother bandages a child's hurts, so we long for your
        grace to heal this wounded world. We ask your blessing upon
        every mother and child whose relationship is strained by
        distance, anger, or unhealed hurts, and we lift up before
        you those whose longing to be a parent has thus far gone
        unfilled.
    - type: people
      leader_text: "Lord, in your mercy,"
      people_text: "hear our prayer."

    - type: leader
      text: >-
        We remember before you those mothers who watch their
        children suffer illness, go hungry, or die of violence. We
        beg your healing grace for all women and children who are
        victims of abuse, injustice, or oppression.
    - type: people
      leader_text: "Lord, in your mercy,"
      people_text: "hear our prayer."

    - type: leader
      text: >-
        Bless our mother Church, may its members be nurtured in
        faith and in love, in service and in truth. And may the
        church reach out with a mother's love and care for those
        who need to hear the shepherd's voice calling their name.
    - type: people
      leader_text: "Lord, in your mercy,"
      people_text: "hear our prayer."

    - type: leader
      text: >-
        We pray for those mothers and children to whom we have said
        farewell for the final time in this life ✠ {departed}, and
        ask your grace and mercy that we may one day join them
        eternally in your kingdom.
    - type: people
      leader_text: "Lord, in your mercy,"
      people_text: "hear our prayer."


    - type: rubric
      text: >-
        The Celebrant adds a concluding Collect and Blessing of the
        Women of the Church. If you’re next to a woman in your life, 
        pleace place a hand on their shoulder or grab their hand 
        as we ask God’s blessing upon them today.

    - type: both
      leader_text: >-
        Loving God, as a mother gives life and nourishment to her children, 
        so you watch over your Church. Bless these mothers and influential 
        women here today and every woman we have brought with us in our 
        hearts. Reveal Your purpose and plan for their life. Bless them 
        and protect them. Deepen their love and trust of You. Strengthen 
        them, empower them, and anoint them with Your Holy Spirit that 
        their faith, influence, and achievement would shine forth and lighten 
        the paths of us, their sons and daughters. Receive our thanks and
        praise again for these women, for they are precious to us and to You.
        In the name of Jesus Christ, we pray.
      people_text: Amen.

# ==========================================================================
# Youth and Graduate Sunday  (custom form, May / June graduation season)
# ==========================================================================
# Source: source_documents/2025 youth and graduate sunday prayers.docx
# Each petition is a long leader call ending in "We pray to you, O Lord."
# followed by the people's response "Lord, hear our prayer." on the same
# line (Form V-style — `type: people` with leader_text + people_text).
# A built-in concluding collect for the graduates closes the form, so
# `concluding_rubric` is empty (the default "The Celebrant concludes with
# a suitable Collect." rubric would be redundant).
youth_and_graduate_sunday:
  title: "Prayers of the People - Youth and Graduate Sunday"
  group: special
  sheet_values:
    - youth and graduate sunday
    - youth_and_graduate_sunday
    - graduate sunday
    - graduates
  season: "special"
  # Form contains its own concluding collect — skip the default
  # "The Celebrant concludes with a suitable Collect." rubric.
  concluding_rubric: ""
  elements:
    - type: people
      leader_text: >-
        I ask your prayers for the Church universal; for our children
        and our children's children to learn your ways and for ever
        more people to know themselves as sons and daughters of God.
        We pray to you, O Lord.
      people_text: "Lord, hear our prayer."

    - type: people
      leader_text: >-
        I ask your prayers for our President {president}, our Governor
        {governor}, and all those in power and authority; for wise
        laws and good governance that will fill our children's future
        with hope and peace. We pray to you, O Lord.
      people_text: "Lord, hear our prayer."

    - type: people
      leader_text: >-
        I ask your prayers for the children and youth of this
        congregation and our community; for the joy of summer, the
        richness of new experiences, and the memories that will be
        made. We pray to you, O Lord.
      people_text: "Lord, hear our prayer."

    - type: people
      leader_text: >-
        I ask your prayers for {graduates}, and all graduates and for
        their families and friends; for all the letting go that comes
        with new experiences and new opportunities. We pray to you,
        O Lord.
      people_text: "Lord, hear our prayer."

    - type: people
      leader_text: >-
        I ask your prayers for orphans and for those without children;
        for all those whose innocence and youth has been stolen by
        this sinful world. We pray to you, O Lord.
      people_text: "Lord, hear our prayer."

    - type: people
      leader_text: >-
        I ask your prayers for young people facing anxiety, depression,
        self-doubt, and difficult decisions; for the constancy of
        God's presence and the support of the community of faith to
        uphold them. We pray to you, O Lord.
      people_text: "Lord, hear our prayer."

    - type: people
      leader_text: >-
        I ask your prayers for those who feel younger than their
        bodies allow; for the challenges of aging, sickness, mental
        health; and for the dying and deceased. We pray to you,
        O Lord.
      people_text: "Lord, hear our prayer."

    # Built-in concluding collect — rendered as `type: both` so the
    # final "Amen." lands on its own line, bold, matching the
    # Mother's Day form's closing convention.
    - type: rubric
      text: "The Celebrant concludes with the following collect for our graduates:"

    - type: both
      leader_text: >-
        Lord Jesus Christ, who came as a child and grew into a man,
        bless those young people for whom this graduation season
        marks a time of transition into a new stage of life. May
        they grasp the reigns of responsibility, wisely enjoy their
        new freedoms, and find the path you have set for them to
        flourish in a chaotic and sinful world. Guide us all, in
        whatever stage of life we are in, to learn and speak the
        truth in love – the same love, O Lord, that binds you and
        Father and Holy Spirit, one God, forever and ever.
      people_text: "Amen."

# ==========================================================================
# Easter  (custom form for Easter Day / Easter Season)
# ==========================================================================
easter:
  title: "Prayers of the People for Easter"
  group: easter
  group_label: Easter
  sheet_values:
    - easter
  concluding_rubric: "The Celebrant concludes with a suitable Collect."
  elements:
    - type: leader
      text: >-
        Risen Lord, we pray to you in peace and joy: Alleluia! Amen!

    - type: leader
      text: >-
        Fill us with grace, not for what we deserve in our sin but as
        you loved us unto death, and call us to new life as your people.
    - type: rubric
      text: "Silence"
    - type: both
      leader_text: "We pray to you in peace and joy."
      people_text: "Alleluia! Amen!"

    - type: leader
      text: >-
        Triumph again over destructive and violent political forces,
        and guide our President {president}, our nation, and all the
        nations of the world to peace and prosperity.
    - type: rubric
      text: "Silence"
    - type: both
      leader_text: "We pray to you in peace and joy."
      people_text: "Alleluia! Amen!"

    - type: leader
      text: >-
        Bring your power of life to those places in our broken world  where
        the power of death seems to rule, especially to the  wars in Iran,
        Ukraine, and conflicts around the world. 
    - type: rubric
      text: "Silence"
    - type: both
      leader_text: "We pray to you in peace and joy."
      people_text: "Alleluia! Amen!"

    - type: leader
      text: >-
        Help your holy Church hold fast to the gospel preached to us
        and to proclaim the angel's message, "He is risen!" to all
        the world.
    - type: rubric
      text: "Silence"
    - type: both
      leader_text: "We pray to you in peace and joy."
      people_text: "Alleluia! Amen!"

    - type: leader
      text: >-
        Grant us wisdom to take care of this created world, which
        once served as your tomb until you burst forth at sunrise in
        the garden.
    - type: rubric
      text: "Silence"
    - type: both
      leader_text: "We pray to you in peace and joy."
      people_text: "Alleluia! Amen!"

    - type: leader
      text: >-
        Encourage and protect those who must kindle hope in the
        darkness of despair, especially the members of our diocese
        currently in immigration detention: {immigration_detainees}
        and their families.
    - type: rubric
      text: "Silence"
    - type: both
      leader_text: "We pray to you in peace and joy."
      people_text: "Alleluia! Amen!"
    - type: leader
      text: >-
        Roll away the heavy stones in our lives that try to stop your
        power: depression, fear, self-doubt, and despair.
    - type: rubric
      text: "Silence"
    - type: both
      leader_text: "We pray to you in peace and joy."
      people_text: "Alleluia! Amen!"

    - type: leader
      text: >-
        Take those who have been rejected by the builders of this
        world—the poor, the oppressed, the suffering, and the
        imprisoned—and use them as living stones in the building of
        your kingdom.
    - type: rubric
      text: "Silence"
    - type: both
      leader_text: "We pray to you in peace and joy."
      people_text: "Alleluia! Amen!"

    - type: leader
      text: >-
        Raise those who have died ✠ {departed}, and sustain us who mourn
        their passing with confident hope in the good news that you
        have swallowed up death forever.
    - type: rubric
      text: "Silence"
    - type: both
      leader_text: "We pray to you in peace and joy."
      people_text: "Alleluia! Amen!"
