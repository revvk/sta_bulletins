- title: Standing on the promises of Christ my King
  category: other
  aac_files:
  - filename: Other/Standing on the promises of Christ my King - [PIANO].m4a
    instrument: piano
  - filename: Other/Standing on the promises of Christ my King [4 verses].m4a
    verses: 4
  - filename: Other/Standing on the promises of Christ my King.m4a
  sections:
  - type: verse
    lines:
    - Standing on the promises of Christ my King,
    - Through eternal ages let His praises ring,
    - Glory in the highest, I will shout and sing,
    - Standing on the promises of God.
  - type: verse
    lines:
    - 'Refrain:        Standing, standing,'
    - Standing on the promises of God my Savior;
    - Standing, standing,
    - I’m standing on the promises of God.
  - type: verse
    lines:
    - Standing on the promises that cannot fail,
    - When the howling storms of doubt and fear assail,
    - By the living Word of God I shall prevail,
    - Standing on the promises of God. (Refrain)
  - type: verse
    lines:
    - Standing on the promises I now can see
    - Perfect, present cleansing in the blood for me;
    - Standing in the liberty where Christ makes free,
    - Standing on the promises of God. (Refrain)
  - type: verse
    lines:
    - Standing on the promises of Christ the Lord,
    - Bound to Him eternally by love’s strong cord,
    - Overcoming daily with the Spirit’s sword,
    - Standing on the promises of God. (Refrain)
  - type: verse
    lines:
    - Standing on the promises I cannot fall,
    - List’ning every moment to the Spirit’s call,
    - Resting in my Savior as my all in all,
    - Standing on the promises of God. (Refrain)
- title: The King is coming
  category: other
  aac_files:
  - filename: Other/The King is coming.m4a
- title: The old rugged cross
  category: other
  aac_files:
  - filename: Other/The old rugged cross.m4a
  sections:
  - type: verse
    lines:
    - On a hill far away stood an old rugged cross,
    - the emblem of suffering and shame;
    - And I love that old cross, where the dearest and best
    - for a world of lost sinners was slain.
  - type: chorus
    lines:
    - So I’ll cherish the old rugged cross,
    - till my trophies at last I lay down.
    - I will cling to the old rugged cross,
    - and exchange it some day for a crown.
  - type: verse
    lines:
    - O the old rugged cross, so despised by the world,
    - has a wondrous attraction for me;
    - For the dear Lamb of God left his glory above
    - to bear it to dark Calvary.
  - type: verse
    lines:
    - In the old rugged cross, stained with blood so divine,
    - a wondrous  beauty I see;
    - For ’twas on that old cross Jesus suffered and died
    - to pardon and sanctify me.
  - type: verse
    lines:
    - To the old rugged cross I will ever be true;
    - Its shame and reproach gladly bear.
    - Then he’ll call me some day to my home far away,
    - where his glory forever I’ll share.
- title: There shall be showers of blessing
  category: other
  aac_files:
  - filename: Other/There shall be showers of blessing [4 verses].m4a
    verses: 4
  - filename: Other/There shall be showers of blessing.m4a
  sections:
  - type: verse
    lines:
    - 'There shall be showers of blessing:'
    - This is the promise of love;
    - There shall be seasons refreshing,
    - Sent from the Savior above.
  - type: verse
    lines:
    - 'Refrain:        Showers of blessing,'
    - 'Showers of blessing we need:'
    - Mercy-drops round us are falling,
    - But for the showers we plead.
  - type: verse
    lines:
    - There shall be showers of blessing,
    - Precious reviving again;
    - Over the hills and the valleys,
    - Sound of abundance of rain. (Refrain)
  - type: verse
    lines:
    - 'There shall be showers of blessing:'
    - Send them upon us, O Lord;
    - Grant to us now a refreshing,
    - Come and now honor Thy Word. (Refrain)
  - type: verse
    lines:
    - 'There shall be showers of blessing:'
    - Oh, that today they might fall,
    - Now as to God we're confessing,
    - Now as on Jesus we call! (Refrain)
- title: This is my Father's world
  category: other
  aac_files:
  - filename: Other/This is my Father's world.m4a
- title: Thy word is a lamp unto my feet
  category: other
  aac_files:
  - filename: Other/Thy word is a lamp unto my feet.m4a
  sections:
  - type: chorus
    lines:
    - Thy Word is a lamp unto my feet
    - and a light unto my path.
    - Thy Word is a lamp unto my feet
    - and a light unto my path.
  - type: verse
    lines:
    - When I feel afraid,
    - and I think I’ve lost my way,
    - still you’re there right beside me.
    - Nothing will I fear
    - as long as you are near.
    - Please be near me to the end.
  - type: verse
    lines:
    - I will not forget
    - your love for me, and yet
    - my heart forever is wandering.
    - Jesus, be my guide
    - and hold me by your side;
    - I will love you to the end.
- title: Victory in Jesus
  category: other
  aac_files:
  - filename: Other/Victory in Jesus.m4a
  sections:
  - type: verse
    lines:
    - 'I heard an old, old story       How a Savior came from glory       How He gave His life on Calvary       To save a wretch like me       I heard about His groaning       Of His precious blood''s atoning       Then I repented of my sins       And won the victory.'
  - type: verse
    lines:
    - "Refrain:         Oh, victory in Jesus, my Savior forever\L        He sought me and bought me with His redeeming blood\L\
      \        He loved me 'ere I knew Him and all my love is due Him\L        He plunged me to victory beneath the cleansing\
      \ flood"
  - type: verse
    lines:
    - 'I heard about His healing       Of His cleansing power revealing       How He made the lame to walk again       And caused the blind to see       And then I cried, "Dear Jesus,'
    - 'come and heal my broken spirit"       And somehow Jesus came and brought'
    - to me the victory (Refrain)
  - type: verse
    lines:
    - I heard about a mansion,
    - he has built for me in glory
    - And I heard about the streets of gold,
    - beyond the crystal sea
    - About the angels singing,
    - and the old redemption story
    - And some sweet day I’ll sing up there,
    - the song of victory. (Refrain)
