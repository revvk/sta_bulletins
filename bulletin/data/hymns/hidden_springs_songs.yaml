- title: Father, we praise thee, now the night is over
  hymnal_number: '1'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/1 - Father, we praise thee, now the night is over.m4a
  sections:
  - type: verse
    lines:
    - Father, we praise thee, now the night is over,
    - active and watchful, stand we all before thee;
    - singing, we offer prayer and meditation;
    - thus we adore thee.
  - type: verse
    lines:
    - Monarch of all things, fit us for thy mansions;
    - banish our weakness, health and wholeness sending;
    - bring us to heaven, where thy saints united
    - joy without ending.
  - type: verse
    lines:
    - All-holy Father, Son, and equal Spirit,
    - Trinity blessed, send us thy salvation;
    - thine is the glory, gleaming and resounding
    - through all creation.
- title: O splendor of God's glory bright
  hymnal_number: '5'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/5 - O splendor of God's glory bright.m4a
  sections:
  - type: verse
    lines:
    - O splendor of God\u2019s glory bright,
    - O thou that bringest light from light,
    - O Light of light, light\u2019s living spring,
    - O Day, all days illumining.
  - type: verse
    lines:
    - O thou true Sun, on us thy glance
    - let fall in royal radiance,
    - the Spirit\u2019s sanctifying beam
    - upon our earthly senses stream.
  - type: verse
    lines:
    - The Father, too, our prayers implore,
    - Father of glory evermore,
    - the Father of all grace and might,
    - to banish sin from our delight.
  - type: verse
    lines:
    - Confirm our will to do the right,
    - and keep our hearts from envy\u2019s blight;
    - let faith her eager fires renew,
    - and hate the false, and love the true.
- title: Morning has broken
  hymnal_number: '8'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/8 - Morning has broken.m4a
  sections:
  - type: verse
    lines:
    - Morning has broken
    - like the first morning,
    - blackbird has spoken
    - like the first bird.
    - Praise for the singing!
    - Praise for the morning!
    - Praise for them, springing
    - fresh from the Word!
  - type: verse
    lines:
    - Sweet the rain’s new fall
    - sunlit from heaven,
    - like the first dew fall
    - on the first grass.
    - Praise for the sweetness
    - of the wet garden,
    - sprung in completeness
    - where his feet pass.
  - type: verse
    lines:
    - Mine is the sunlight!
    - Mine is the morning
    - born of the one light
    - Eden saw play!
    - Praise with elation,
    - praise every morning,
    - God’s recreation,
    - of the new day!
- title: Savior of the nations, come!
  hymnal_number: '54'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/54 - Savior of the nations, come!.m4a
  sections:
  - type: verse
    lines:
    - Savior of the nations, come!
    - Virgin’s Son, make here your home.
    - Marvel now, both heaven and earth,
    - that the Lord chose such a birth.
  - type: verse
    lines:
    - Wondrous birth! Oh, wondrous child
    - of the Virgin undefiled!
    - Mighty God and Mary’s son,
    - eager now his race to run!
  - type: verse
    lines:
    - Thus on earth the Word appears,
    - gracing his created spheres;
    - hence to death and hell descends,
    - then the heavenly throne ascends.
  - type: verse
    lines:
    - Come, O Father’s saving Son,
    - who o’er sin the victory won.
    - Boundless shall your kingdom be;
    - grant that we its glories see.
- title: O come, O come, Emmanuel
  hymnal_number: '56'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/56 - O come, O come, Emmanuel [2 verses].m4a
    verses: 2
  - filename: Hymnal 1982/56 - O come, O come, Emmanuel [4 verses].m4a
    verses: 4
  sections:
  - type: verse
    lines:
    - O come, O come, Emmanuel,
    - and ransom captive Israel,
    - that mourns in lonely exile here
    - until the Son of God appear.
  - type: chorus
    lines:
    - Rejoice! Rejoice! Emmanuel
    - shall come to thee, O Israel!
  - type: verse
    lines:
    - O come, thou Wisdom from on high,
    - who orderest all things mightily;
    - to us the path of knowledge show,
    - and teach us in her ways to go.
  - type: verse
    lines:
    - O come, O come, thou Lord of might,
    - who to thy tribes on Sinai’s height
    - in ancient times didst give the law,
    - in cloud, and majesty, and awe.
  - type: verse
    lines:
    - O come, thou Branch of Jesse’s tree,
    - free them from Satan’s tyranny
    - that trust thy mighty power to save,
    - and give them victory o’er the grave.
  - type: verse
    lines:
    - O come, thou Key of David, come,
    - and open wide our heavenly home;
    - make safe the way the leads on high,
    - and close the path to misery.
  - type: verse
    lines:
    - O come, thou Dayspring from on high,
    - and cheer us by thy drawing nigh;
    - disperse the gloomy clouds of night,
    - and death’s dark shadow put to flight.
  - type: verse
    lines:
    - O come, Desire of nations,
    - bind in one the hearts of all mankind;
    - bid thou our sad divisions cease,
    - and be thyself our King of Peace.
- title: On Jordan's bank the Baptist's cry
  hymnal_number: '76'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/76 - On Jordan's bank the Baptist's cry.m4a
  sections:
  - type: verse
    lines:
    - On Jordan's bank the Baptist's cry
    - announces that the Lord is nigh;
    - awake and hearken, for he brings
    - glad tidings of the King of kings.
  - type: verse
    lines:
    - To heal the sick stretch out thine hand,
    - and bid the fallen sinner stand;
    - shine forth, and let thy light restore
    - earth's own true loveliness once more.
  - type: verse
    lines:
    - All praise, eternal Son, to thee,
    - whose advent doth thy people free;
    - whom with the Father we adore
    - and Holy Spirit evermore.
- title: O little town of Bethlehem
  hymnal_number: '79'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/79 - O little town of Bethlehem [5 verses].m4a
    verses: 5
  sections:
  - type: verse
    lines:
    - O little town of Bethlehem,
    - how still we see thee lie!
    - Above thy deep and dreamless sleep
    - the silent stars go by;
    - yet in thy dark streets shineth
    - the everlasting Light;
    - the hopes and fears of all the years
    - are met in thee tonight.
  - type: verse
    lines:
    - For Christ is born of Mary,
    - and gathered all above,
    - while mortals sleep, the angels keep
    - their watch of wondering love.
    - O morning stars, together
    - proclaim the holy birth!
    - And praises sing to God the King,
    - and peace to men on earth.
  - type: verse
    lines:
    - How silently, how silently,
    - the wondrous gift is given!
    - So God imparts to human hearts
    - the blessings of his heaven.
    - No ear may hear his coming,
    - but in this world of sin,
    - where meek souls will receive him, still
    - the dear Christ enters in.
  - type: verse
    lines:
    - Where children pure and happy
    - pray to the blessed Child,
    - where misery cries out to thee,
    - Son of the mother mild;
    - where charity stands watching
    - and faith holds wide the door,
    - the dark night wakes, the glory breaks,
    - and Christmas comes once more.
  - type: verse
    lines:
    - O holy Child of Bethlehem,
    - descend to us, we pray;
    - cast out our sin and enter in,
    - be born in us today.
    - We hear the Christmas angels
    - the great glad tidings tell;
    - O come to us, abide with us,
    - our Lord Emmanuel!
- title: O come, all ye faithful
  hymnal_number: '83'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/83 - O come, all ye faithful [5 verses].m4a
    verses: 5
  sections:
  - type: verse
    lines:
    - O come, all ye faithful,
    - joyful and triumphant,
    - O come ye, O come ye to Bethlehem;
    - come, and behold him,
    - born the King of angels;
  - type: verse
    lines:
    - 'Refrain:        O come, let us adore him,'
    - O come, let us adore him,
    - O come, let us adore him,
    - Christ the Lord.
  - type: verse
    lines:
    - God from God,
    - Light from Light eternal,
    - lo! he abhors not the Virgin's womb;
    - only-begotten
    - Son of the Father; (refrain)
  - type: verse
    lines:
    - Sing, choirs of angels,
    - sing in exultation;
    - sing, all ye citizens of heaven above;
    - glory to God,
    - glory in the highest; (refrain)
  - type: verse
    lines:
    - See how the shepherds,
    - summoned to his cradle,
    - leaving their flocks, draw nigh to gaze;
    - we too will thither
    - bend our joyful footsteps; (refrain)
  - type: verse
    lines:
    - Child, for us sinners
    - poor and in the manger,
    - we would embrace thee, with love and awe;
    - who would not love thee,
    - loving us so dearly? (refrain)
  - type: verse
    lines:
    - Yea, Lord, we greet thee,
    - born this happy morning;
    - Jesus, to thee be glory given;
    - Word of the Father,
    - now in flesh appearing; (refrain)
- title: Hark! the herald angels sing
  hymnal_number: '87'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/87 - Hark! the herald angels sing [2 verses].m4a
    verses: 2
  - filename: Hymnal 1982/87 - Hark! the herald angels sing [3 verses].m4a
    verses: 3
  sections:
  - type: verse
    lines:
    - Hark! the herald angels sing
    - glory to the newborn King!
    - Peace on earth and mercy mild,
    - God and sinners reconciled!
    - Joyful, all ye nations, rise,
    - join the triumph of the skies;
    - with the angelic hosts proclaim
    - Christ is born in Bethlehem!
    - Hark! the herald angels sing,
    - glory to the newborn King!
  - type: verse
    lines:
    - Christ, by highest heaven adored;
    - Christ, the everlasting Lord;
    - late in time behold him come,
    - offspring of the Virgin's womb.
    - Veiled in flesh the Godhead see;
    - hail the incarnate Deity.
    - Pleased as man with us to dwell;
    - Jesus, our Emmanuel!
    - Hark! the herald angels sing,
    - glory to the newborn King!
  - type: verse
    lines:
    - Mild he lays his glory by,
    - born that we no more may die,
    - born to raise us from the earth,
    - born to give us second birth.
    - Risen with healing in his wings,
    - Light and life to all he brings,
    - hail, the Sun of Righteousness!
    - hail, the heaven-born Prince of Peace!
    - Hark! the herald angels sing,
    - glory to the newborn King!
- title: Angels we have heard on high
  hymnal_number: '96'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/96 - Angels we have heard on high.m4a
  sections:
  - type: verse
    lines:
    - Angels we have heard on high
    - sweetly singing through the night,
    - and the mountains in reply
    - echoing their brave delight.
  - type: verse
    lines:
    - 'Refrain:        Glo—ria in excelsis Deo.'
    - Glo—ria in excelsis Deo.
  - type: verse
    lines:
    - Shepherds, why this jubilee?
    - Why these songs of happy cheer?
    - What great brightness did you see?
    - What glad tidings did you hear? (refrain)
  - type: verse
    lines:
    - Come to Bethlehem and see
    - him whose birth the angels sing;
    - come, adore on bended knee
    - Christ, the Lord, the newborn King. (refrain)
  - type: verse
    lines:
    - See him in a manger laid,
    - whom the angels praise above;
    - Mary, Joseph, lend your aid,
    - while we raise our hearts in love. (refrain)
- title: Joy to the world! the Lord is come
  hymnal_number: '100'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/100 - Joy to the world! the Lord is come [4 verses] - [ORGAN].m4a
    verses: 4
    instrument: organ
  - filename: Hymnal 1982/100 - Joy to the world! the Lord is come [4 verses] - [PIANO].m4a
    verses: 4
    instrument: piano
  sections:
  - type: verse
    lines:
    - 'Joy to the world! the Lord is come:'
    - let earth receive her King;
    - let every heart prepare him room,
    - and heaven and nature sing,
    - and heaven and nature sing,
    - and heaven, and heaven and nature sing.
  - type: verse
    lines:
    - Joy to the world! the Savior reigns;
    - let us our songs employ,
    - while fields and floods, rocks, hills, and plains,
    - repeat the sounding joy,
    - repeat the sounding joy,
    - repeat, repeat the sounding joy.
  - type: verse
    lines:
    - No more let sins and sorrows grow,
    - nor thorns infest the ground;
    - he comes to make his blessings flow
    - far as the curse is found,
    - far as the curse is found,
    - far as, far as the curse is found.
  - type: verse
    lines:
    - He rules the world with truth and grace,
    - and makes the nations prove
    - the glories of his righteousness,
    - and wonders of his love,
    - and wonders of his love,
    - and wonders, wonders of his love.
- title: Away in a manger, no crib for his bed
  hymnal_number: '101'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/101 - Away in a manger, no crib for his bed [3 verses] - [PIANO].m4a
    verses: 3
    instrument: piano
  sections:
  - type: verse
    lines:
    - Away in a manger, no crib for his bed,
    - the little Lord Jesus laid down his sweet head.
    - The stars in the bright sky looked down where he lay,
    - the little Lord Jesus asleep on the hay.
  - type: verse
    lines:
    - The cattle are lowing, the baby awakes,
    - but little Lord Jesus no crying he makes.
    - I love thee, Lord Jesus! Look down from the sky,
    - and stay by my side until morning is nigh.
  - type: verse
    lines:
    - Be near me, Lord Jesus; I ask thee to stay
    - close by me forever, and love me, I pray.
    - Bless all the dear children in thy tender care,
    - and fit us for heaven, to live with thee there.
- title: The first Nowell the angel did say
  hymnal_number: '109'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/109 - The first Nowell the angel did say [4 verses] - [PIANO].m4a
    verses: 4
    instrument: piano
  sections:
  - type: verse
    lines:
    - The first Nowell the angel did say
    - was to certain poor shepherds in fields as they lay;
    - in fields where they lay keeping their sheep,
    - on a cold winter\u2019s night that was so deep.
  - type: chorus
    lines:
    - Nowell, Nowell, Nowell, Nowell,
    - born is the King of Israel.
  - type: verse
    lines:
    - They look\u00e8d up and saw a star
    - shining in the east, beyond them far,
    - and to the earth it gave great light,
    - and so it continued both day and night.
  - type: verse
    lines:
    - And by the light of that same star
    - three wise men came from country far;
    - to seek for a king was their intent,
    - and to follow the star wherever it went.
  - type: verse
    lines:
    - This star drew nigh to the northwest,
    - o\u2019er Bethlehem it took its rest,
    - and there it did both stop and stay,
    - right over the place where Jesus lay.
  - type: verse
    lines:
    - Then enter\u00e8d in those wise men three,
    - full reverently upon their knee,
    - and offered there in his presence
    - their gold, and myrrh, and frankincense.
- title: Silent night, holy night
  hymnal_number: '111'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/111 - Silent night, holy night.m4a
  sections:
  - type: verse
    lines:
    - Silent night, holy night,
    - all is calm, all is bright
    - round yon virgin mother and child.
    - Holy infant, so tender and mild,
    - sleep in heavenly peace.
    - Sleep in heavenly peace.
  - type: verse
    lines:
    - Silent night, holy night,
    - shepherds quake at the sight,
    - glories stream from heaven afar,
    - heavenly hosts sing alleluia;
    - Christ, the Savior, is born!
    - Christ, the Savior, is born!
  - type: verse
    lines:
    - Silent night, holy night,
    - Son of God, love's pure light
    - radiant beams from thy holy face,
    - with the dawn of redeeming grace,
    - Jesus, Lord at thy birth.
    - Jesus, Lord at thy birth.
- title: What child is this, who, laid to rest
  hymnal_number: '115'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/115 - What child is this, who, laid to rest [2 verses].m4a
    verses: 2
  - filename: Hymnal 1982/115 - What child is this, who, laid to rest [3 verses] - [PIANO].m4a
    verses: 3
    instrument: piano
  sections:
  - type: verse
    lines:
    - What child is this, who, laid to rest,
    - on Mary's lap is sleeping?
    - Whom angels greet with anthems sweet,
    - while shepherds watch are keeping?
  - type: verse
    lines:
    - 'Refrain:        This, this is Christ the King,'
    - whom shepherds guard and angels sing;
    - haste, haste to bring him laud,
    - the babe, the son of Mary.
  - type: verse
    lines:
    - Why lies he in such mean estate
    - where ox and ass are feeding?
    - 'Good Christian, fear: for sinners here'
    - the silent Word is pleading. (refrain)
  - type: verse
    lines:
    - So bring him incense, gold, and myrrh,
    - come, peasant, king, to own him;
    - the King of kings salvation brings,
    - let loving hearts enthrone him. (refrain)
- title: We three kings of Orient are
  hymnal_number: '128'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/128 - We three kings of Orient are.m4a
  sections:
  - type: verse
    lines:
    - We three kings of Orient are,
    - bearing gifts we traverse afar,
    - field and fountain,
    - moor and mountain,
    - following yonder star.
  - type: chorus
    lines:
    - O star of wonder, star of night,
    - star with royal beauty bright;
    - westward leading,
    - still proceeding,
    - guide us to thy perfect light!
  - type: verse
    lines:
    - Born a King on Bethlehem's plain,
    - gold I bring to crown him again,
    - King for ever,
    - ceasing never
    - over us all to reign.
  - type: verse
    lines:
    - 'Frankincense to offer have I:'
    - incense owns a Deity nigh;
    - prayer and praising,
    - gladly raising,
    - worship him, God Most High.
  - type: verse
    lines:
    - Myrrh is mine; its bitter perfume
    - breathes a life of gathering gloom;
    - sorrowing, sighing,
    - bleeding, dying,
    - sealed in the stone-cold tomb
  - type: verse
    lines:
    - Glorious now behold him arise,
    - King and God and Sacrifice;
    - 'heaven sings alleluia:'
    - alleluia
    - the earth replies.
- title: Holy, holy, holy Lord, God of power and might
  hymnal_number: S130
  category: hymnal
  no_lyrics: true
  aac_files:
  - filename: Hymnal 1982/S130 - Holy, holy, holy Lord, God of power and might.m4a
- title: Lord, who throughout these forty days
  hymnal_number: '142'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/142 - Lord, who throughout these forty days.m4a
  sections:
  - type: verse
    lines:
    - Lord, who throughout these forty days
    - for us didst fast and pray,
    - teach us with thee to mourn our sins,
    - and close by thee to stay.
  - type: verse
    lines:
    - As thou with Satan didst contend,
    - and didst the victory win,
    - O give us strength in thee to fight,
    - in thee to conquer sin.
  - type: verse
    lines:
    - As thou didst hunger bear and thirst,
    - so teach us, gracious Lord,
    - to die to self, and chiefly live
    - by thy most holy word.
  - type: verse
    lines:
    - And through these days of penitence,
    - and through thy Passiontide,
    - yea, evermore, in life and death,
    - Jesus! with us abide.
  - type: verse
    lines:
    - Abide with us, that so, this life
    - of suffering overpast,
    - an Easter of unending joy
    - we may attain at last!
- title: All glory, laud, and honor
  hymnal_number: '154'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/154 - All glory, laud, and honor.m4a
  sections:
  - type: chorus
    lines:
    - All glory, laud, and honor
    - to thee, Redeemer, King!
    - to whom the lips of children
    - made sweet hosannas ring.
  - type: verse
    lines:
    - Thou art the King of Israel,
    - thou David's royal Son,
    - who in the Lord's Name comest,
    - the King and Blessed One.
  - type: verse
    lines:
    - The company of angels
    - are praising thee on high;
    - and we with all creation
    - in chorus make reply.
  - type: verse
    lines:
    - The people of the Hebrews
    - with palms before thee went;
    - our praise and prayer and anthems
    - before thee we present.
  - type: verse
    lines:
    - To thee before thy passion
    - they sang their hymns of praise;
    - to thee, now high exalted,
    - our melody we raise.
  - type: verse
    lines:
    - Thou didst accept their praises;
    - accept the prayers we bring,
    - who in all good delightest,
    - thou good and gracious King.
- title: Alleluia, alleluia! Give thanks to the risen Lord
  hymnal_number: '178'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/178 - Alleluia, alleluia! Give thanks to the risen Lord.m4a
  sections:
  - type: chorus
    lines:
    - 'Alleluia, alleluia, '
    - give thanks to the Risen Lord,
    - alleluia, alleluia,
    - give praise to his name.
  - type: verse
    lines:
    - Jesus is Lord of all the earth,
    - he is the King of creation.
  - type: verse
    lines:
    - Spread the good news o’er all the earth,
    - Jesus has died and has risen.
  - type: verse
    lines:
    - We have been crucified with Christ.
    - Now we shall live forever.
  - type: verse
    lines:
    - Come let us praise the Living God,
    - joyfully sing to our Savior.
- title: Jesus Christ is risen today, Alleluia!
  hymnal_number: '207'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/207 - Jesus Christ is risen today, Alleluia! [4 verses].m4a
    verses: 4
  sections:
  - type: verse
    lines:
    - Jesus Christ is risen today, Alleluia!
    - our triumphant holy day, Alleluia!
    - who did once, upon the cross, Alleluia!
    - suffer to redeem our loss, Alleluia!
  - type: verse
    lines:
    - Hymns of praise then let us sing, Alleluia!
    - unto Christ, our heavenly King, Alleluia!
    - who endured the cross and grave, Alleluia!
    - sinners to redeem and save, Alleluia!
  - type: verse
    lines:
    - But the pains which he endured, Alleluia!
    - our salvation have procured, Alleluia!
    - now above the sky he’s King, Alleluia!
    - where the angels ever sing, Alleluia!
  - type: verse
    lines:
    - Sing we to our God above, Alleluia!
    - praise eternal as his love, Alleluia!
    - praise him, all ye heavenly host, Alleluia!
    - Father, Son, and Holy Ghost, Alleluia!
- title: 'Glory to God: Gloria in excelsis'
  hymnal_number: S280
  category: hymnal
  no_lyrics: true
  aac_files:
  - filename: 'Hymnal 1982/S280 - Glory to God: Gloria in excelsis.m4a'
- title: Come, ye thankful people, come
  hymnal_number: '290'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/290 - Come, ye thankful people, come.m4a
  sections:
  - type: verse
    lines:
    - Come, ye thankful people, come,
    - raise the song of harvest home;
    - all is safely gathered in,
    - ere the winter storms begin.
    - God, our Maker, doth provide
    - for our wants to be supplied;
    - come to God's own temple, come,
    - raise the song of harvest home.
  - type: verse
    lines:
    - All the world is God's own field,
    - fruit unto his praise to yield;
    - wheat and tares together sown
    - unto joy or sorrow grown;
    - first the blade and then the ear,
    - then the full corn shall appear:
    - Lord of harvest, grant that we
    - wholesome grain and pure may be.
  - type: verse
    lines:
    - For the Lord our God shall come,
    - and shall take his harvest home;
    - from his field shall in that day
    - all offenses purge away,
    - giving angels charge at last
    - in the fire the tares to cast;
    - but the fruitful ears to store
    - in his garner evermore.
  - type: verse
    lines:
    - Even so, Lord, quickly come,
    - bring thy final harvest home;
    - gather thou thy people in,
    - free from sorrow, free from sin,
    - there for ever purified,
    - in thy presence to abide;
    - come, with all thine angels come,
    - raise the glorious harvest home.
- title: I sing a song of the saints of God
  hymnal_number: '293'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/293 - I sing a song of the saints of God.m4a
  sections:
  - type: verse
    lines:
    - I sing a song of the saints of God,
    - patient and brave and true,
    - who toiled and fought and lived and died
    - for the Lord they loved and knew.
    - And one was a doctor, and one was a queen,
    - 'and one was a shepherdess on the green:'
    - they were all of them saints of God—and I mean,
    - God helping, to be one too.
  - type: verse
    lines:
    - They loved their Lord so dear, so dear,
    - and his love made them strong;
    - and they followed the right, for Jesus' sake,
    - the whole of their good lives long.
    - And one was a soldier, and one was a priest,
    - 'and one was slain by a fierce wild beast:'
    - and there's not any reason, no, not the least,
    - why I shouldn't be one too.
  - type: verse
    lines:
    - They lived not only in ages past,
    - there are hundreds of thousands still,
    - the world is bright with the joyous saints
    - who love to do Jesus' will.
    - You can meet them in school, or in lanes, or at sea,
    - in church, or in trains, or in shops, or at tea,
    - for the saints of God are just folk like me,
    - and I mean to be one too.
- title: I come with joy to meet my Lord
  hymnal_number: '304'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/304 - I come with joy to meet my Lord.m4a
  sections:
  - type: verse
    lines:
    - I come with joy to meet my Lord,
    - forgiven, loved, and free,
    - in awe and wonder to recall
    - his life laid down for me.
  - type: verse
    lines:
    - I come with Christians far and near
    - to find, as all are fed,
    - the new community of love
    - in Christ's communion bread.
  - type: verse
    lines:
    - As Christ breaks bread and bids us share,
    - each proud division ends.
    - The love that made us makes us one,
    - and strangers now are friends.
  - type: verse
    lines:
    - And thus with joy we meet our Lord.
    - His presence, always near,
    - 'is in such friendship better known:'
    - we see and praise him here.
  - type: verse
    lines:
    - Together met, together bound,
    - we'll go our different ways
    - and as his people in the world
    - we'll live and speak his praise.
- title: I am the bread of life
  hymnal_number: '335'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/335 - I am the bread of life.m4a
  sections:
  - type: verse
    lines:
    - I am the bread of life.
    - they who come to me shall not hunger;
    - they who believe in me shall not thirst.
    - 'No one can come to me       unless the Father draw him.'
  - type: verse
    lines:
    - 'Refrain:        And I will raise them up,'
    - and I will raise them up,
    - and I will raise them up on the last day.
  - type: verse
    lines:
    - 'The bread that I will give       is my flesh for the life of the world,'
    - and they who eat of this bread,
    - they shall live for ever,
    - they shall live for ever. (refrain)
  - type: verse
    lines:
    - I am the resurrection,
    - I am the life.
    - 'they who believe in me       even if they die,'
    - they shall live for ever. (refrain)
  - type: verse
    lines:
    - Yes, Lord, we believe
    - that you are the Christ,
    - the Son of God,
    - who has come into the world. (refrain)
- title: Holy, holy, holy! Lord God Almighty!
  hymnal_number: '362'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/362 - Holy, holy, holy! Lord God Almighty! [4 verses].m4a
    verses: 4
  - filename: Hymnal 1982/362 - Holy, holy, holy! Lord God Almighty!.m4a
  sections:
  - type: verse
    lines:
    - Holy, holy, holy! Lord God Almighty!
    - 'Early in the morning our song shall rise to thee:'
    - Holy, holy, holy! Merciful and mighty,
    - God in three Persons, blessed Trinity.
  - type: verse
    lines:
    - Holy, holy, holy! All the saints adore thee,
    - casting down their golden crowns around the glassy sea;
    - cherubim and seraphim falling down before thee,
    - which wert, and art, and evermore shalt be.
  - type: verse
    lines:
    - Holy, holy, holy! Though the darkness hide thee,
    - though the sinful human eye thy glory may not see,
    - only thou art holy; there is none beside thee,
    - perfect in power, in love, and purity.
  - type: verse
    lines:
    - Holy, holy, holy! Lord God Almighty!
    - All thy works shall praise thy Name, in earth, and sky, and sea;
    - Holy, holy, holy! Merciful and mighty,
    - God in three Persons, blessed Trinity.
- title: Joyful, joyful, we adore thee
  hymnal_number: '376'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/376 - Joyful, joyful, we adore thee [3 verses].m4a
    verses: 3
  - filename: Hymnal 1982/376 - Joyful, joyful, we adore thee.m4a
  sections:
  - type: verse
    lines:
    - Joyful, joyful, we adore thee,
    - God of glory, Lord of love;
    - hearts unfold like flowers before thee,
    - praising thee, their sun above.
    - Melt the clouds of sin and sadness;
    - drive the dark of doubt away;
    - giver of immortal gladness,
    - fill us with the light of day.
  - type: verse
    lines:
    - All thy works with joy surround thee,
    - earth and heaven reflect thy rays,
    - stars and angels sing around thee,
    - center of unbroken praise.
    - field and forest, vale and mountain,
    - blooming meadow, flashing sea,
    - chanting bird and flowing fountain,
    - call us to rejoice in thee.
  - type: verse
    lines:
    - Thou art giving and forgiving,
    - ever blessing, ever blest,
    - wellspring of the joy of living,
    - ocean-depth of happy rest!
    - 'Thou our Father, Christ our Brother:'
    - all who live in love are thine;
    - teach us how to love each other,
    - lift us to the joy divine.
- title: Fairest Lord Jesus
  hymnal_number: '383'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/383 - Fairest Lord Jesus.m4a
  sections:
  - type: verse
    lines:
    - Holy, holy, holy! Lord God Almighty!
    - 'Early in the morning our song shall rise to thee:'
    - Holy, holy, holy! Merciful and mighty,
    - God in three Persons, blessed Trinity.
  - type: verse
    lines:
    - Holy, holy, holy! All the saints adore thee,
    - casting down their golden crowns around the glassy sea;
    - cherubim and seraphim falling down before thee,
    - which wert, and art, and evermore shalt be.
  - type: verse
    lines:
    - Holy, holy, holy! Though the darkness hide thee,
    - though the sinful human eye thy glory may not see,
    - only thou art holy; there is none beside thee,
    - perfect in power, in love, and purity.
  - type: verse
    lines:
    - Holy, holy, holy! Lord God Almighty!
    - All thy works shall praise thy Name, in earth, and sky, and sea;
    - Holy, holy, holy! Merciful and mighty,
    - God in three Persons, blessed Trinity.
- title: Praise to the Lord, the Almighty
  hymnal_number: '390'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/390 - Praise to the Lord, the Almighty.m4a
  sections:
  - type: verse
    lines:
    - Praise to the Lord, the Almighty, the King of creation;
    - 'O my soul, praise him, for he is thy health and salvation:'
    - join the great throng, psaltery, organ, and song,
    - sounding in glad adoration.
  - type: verse
    lines:
    - 'Praise to the Lord; over all things he gloriously reigneth:'
    - borne as on eagle wings, safely his saints he sustaineth.
    - Hast thou not seen how all thou neediest hath been
    - granted in what he ordaineth?
  - type: verse
    lines:
    - Praise to the Lord, who doth prosper thy way and defend thee;
    - surely his goodness and mercy shall ever attend thee;
    - ponder anew what the Almighty can do,
    - who with his love doth befriend thee.
  - type: verse
    lines:
    - Praise to the Lord! O let all that is in me adore him!
    - All that hath life and breath come now with praises before him!
    - Let the amen sound from his people again;
    - gladly forever adore him.
- title: All creatures of our God and King
  hymnal_number: '400'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/400 - All creatures of our God and King.m4a
  sections:
  - type: verse
    lines:
    - All creatures of our God and King,
    - 'lift up your voices, let us sing:'
    - Alleluia, alleluia!
    - Bright burning sun with golden beams,
    - pale silver moon that gently gleams,
    - O praise him, O praise him,
    - Alleluia, alleluia, alleluia!
  - type: verse
    lines:
    - Great rushing winds and breezes soft,
    - you clouds that ride the heavens aloft,
    - O praise him, Alleluia!
    - Fair rising morn, with praise rejoice,
    - 'stars nightly shining, find a voice:'
    - O praise him, O praise him,
    - Alleluia, alleluia, alleluia!
  - type: verse
    lines:
    - Swift flowing water, pure and clear,
    - make music for your Lord to hear,
    - Alleluia, alleluia!
    - Fire, so intense and fiercely bright,
    - you give to us both warmth and light,
    - O praise him, O praise him,
    - Alleluia, alleluia, alleluia!
  - type: verse
    lines:
    - Dear mother earth, you day by day
    - unfold your blessings on our way,
    - O praise him, Alleluia!
    - All flowers and fruits that in you grow,
    - 'let them his glory also show:'
    - O praise him, O praise him,
    - Alleluia, alleluia, alleluia!
  - type: verse
    lines:
    - All you with mercy in your heart,
    - forgiving others, take your part,
    - 'O sing now: Alleluia!'
    - All you that pain and sorrow bear,
    - 'praise God, and cast on him your care:'
    - O praise him, O praise him,
    - Alleluia, alleluia, alleluia!
  - type: verse
    lines:
    - And even you, most gentle death,
    - waiting to hush our final breath,
    - O praise him, Alleluia!
    - You lead back home the child of God,
    - 'for Christ our Lord that way has trod:'
    - O praise him, O praise him,
    - Alleluia, alleluia, alleluia!
  - type: verse
    lines:
    - Let all things their creator bless,
    - and worship him in humbleness,
    - O praise him, Alleluia!
    - Praise God the Father, praise the Son,
    - 'and praise the Spirit, Three in One:'
    - O praise him, O praise him,
    - Alleluia, alleluia, alleluia!
- title: All things bright and beautiful
  hymnal_number: '405'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/405 - All things bright and beautiful.m4a
  sections:
  - type: chorus
    lines:
    - All things bright and beautiful,
    - all creatures great and small,
    - all things wise and wonderful,
    - the Lord God made them all.
  - type: verse
    lines:
    - Each little flower that opens,
    - each little bird that sings,
    - he made their glowing colors,
    - he made their tiny wings.
  - type: verse
    lines:
    - The purple-headed mountain,
    - the river running by,
    - the sunset, and the morning
    - that brightens up the sky.
  - type: verse
    lines:
    - The cold wind in the winter,
    - the pleasant summer sun,
    - the ripe fruits in the garden,
    - he made them every one.
  - type: verse
    lines:
    - He gave us eyes to see them,
    - and lips that we might tell
    - how great is God Almighty,
    - who has made all things well.
- title: Praise, my soul, the King of heaven
  hymnal_number: '410'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/410 - Praise, my soul, the King of heaven [ORGAN].m4a
    instrument: organ
  sections:
  - type: verse
    lines:
    - Praise, my soul, the King of heaven;
    - to his feet thy tribute bring;
    - ransomed, healed, restored, forgiven,
    - evermore his praises sing.
    - Alleluia, alleluia!
    - Praise the everlasting King.
  - type: verse
    lines:
    - Praise him for his grace and favor
    - to his people in distress;
    - praise him still the same as ever,
    - slow to chide, and swift to bless.
    - Alleluia, alleluia!
    - Glorious in his faithfulness.
  - type: verse
    lines:
    - Fatherlike he tends and spares us;
    - well our feeble frame he knows;
    - in his hand he gently bears us,
    - rescues us from all our foes.
    - Alleluia, alleluia!
    - Widely yet his mercy flows.
  - type: verse
    lines:
    - Angels, help us to adore him;
    - ye behold him face to face;
    - sun and moon, bow down before him,
    - dwellers all in time and space.
    - Alleluia, alleluia!
    - Praise with us the God of grace.
- title: For the beauty of the earth
  hymnal_number: '416'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/416 - For the beauty of the earth.m4a
  sections:
  - type: verse
    lines:
    - For the beauty of the earth,
    - for the glory of the skies,
    - for the love which from our birth
    - 'over and around us lies:'
    - Lord of all, to thee we raise
    - this our hymn of grateful praise.
  - type: verse
    lines:
    - For the beauty of each hour
    - of the day and of the night,
    - hill and vale and tree and flower,
    - 'sun and moon and stars of light:'
    - Lord of all, to thee we raise
    - this our hymn of grateful praise.
  - type: verse
    lines:
    - For the joy of human love,
    - brother, sister, parent, child,
    - friends on earth and friends above;
    - 'for all gentle thoughts and mild:'
    - Lord of all, to thee we raise
    - this our hymn of grateful praise.
  - type: verse
    lines:
    - For thy Church, that evermore
    - lifteth holy hands above,
    - offering up on every shore
    - 'her pure sacrifice of love:'
    - Lord of all, to thee we raise
    - this our hymn of grateful praise.
  - type: verse
    lines:
    - For thyself, best gift divine,
    - to this world so freely given,
    - for that great, great love of Thine,
    - 'peace on earth and joy in heaven:'
    - Lord of all, to thee we raise
    - This our hymn of grateful praise.
- title: Immortal, invisible, God only wise
  hymnal_number: '423'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/423 - Immortal, invisible, God only wise [PIANO].m4a
    instrument: piano
  sections:
  - type: verse
    lines:
    - Immortal, invisible, God only wise,
    - in light inaccessible hid from our eyes,
    - most blessed, most glorious, the Ancient of Days,
    - almighty, victorious, thy great Name we praise.
  - type: verse
    lines:
    - Unresting, unhasting, and silent as light,
    - nor wanting, nor wasting, thou rulest in might;
    - thy justice like mountains high soaring above
    - thy clouds, which are fountains of goodness and love.
  - type: verse
    lines:
    - To all life thou givest, to both great and small;
    - in all life thou livest, the true life of all;
    - we blossom and flourish, like leaves on the tree,
    - then wither and perish; but nought changeth thee.
  - type: verse
    lines:
    - Thou reignest in glory, thou rulest in light,
    - thine angels adore thee, all veiling their sight;
    - 'all laud we would render: O help us to see'
    - '''tis only the splendor of light hideth thee.'
- title: We gather together to ask the Lord's blessing
  hymnal_number: '433'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/433 - We gather together to ask the Lord's blessing.m4a
  sections:
  - type: verse
    lines:
    - We gather together to ask the Lord’s blessing;
    - he chastens and hastens his will to make known;
    - 'the wicked oppressing now cease from distressing:'
    - sing praises to his Name; he forgets not his own.
  - type: verse
    lines:
    - Beside us to guide us, our God with us joining,
    - ordaining, maintaining his kingdom divine;
    - so from the beginning the fight we were winning;
    - 'thou, Lord, wast at our side: all glory be thine!'
  - type: verse
    lines:
    - We all do extol thee, thou leader triumphant,
    - and pray that thou still our defender wilt be.
    - 'Let thy congregation escape tribulation:'
    - thy Name be ever praised! O Lord, make us free!
- title: What wondrous love is this
  hymnal_number: '439'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/439 - What wondrous love is this.m4a
  sections:
  - type: verse
    lines:
    - What wondrous love is this, O my soul, O my soul!
    - What wondrous love is this, O my soul!
    - What wondrous love is this that caused the Lord of bliss
    - to lay aside his crown for my soul, for my soul,
    - to lay aside his crown for my soul.
  - type: verse
    lines:
    - To God and to the Lamb I will sing, I will sing,
    - to God and to the Lamb I will sing.
    - To God and to the Lamb, who is the great I AM ,
    - while millions join the theme, I will sing, I will sing,
    - while millions join the theme I will sing!
  - type: verse
    lines:
    - And when from death I'm free, I'll sing on, I'll sing on,
    - and when from death I'm free, I'll sing on.
    - And when from death I'm free I'll sing and joyful be,
    - and through eternity I'll sing on, I'll sing on,
    - and through eternity I'll sing on.
- title: All hail the power of Jesus' Name!
  hymnal_number: '450'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/450 - All hail the power of Jesus' Name! [PIANO].m4a
    instrument: piano
  sections:
  - type: verse
    lines:
    - All hail the power of Jesus' Name!
    - Let angels prostrate fall;
    - bring forth the royal diadem,
    - and crown him Lord of all!
    - bring forth the royal diadem,
    - and crown him Lord of all!
  - type: verse
    lines:
    - Crown him ye martyrs of our God,
    - 'who from his altar call:'
    - praise him whose way of pain ye trod,
    - and crown him Lord of all!
    - praise him whose way of pain ye trod,
    - and crown him Lord of all!
  - type: verse
    lines:
    - Hail him, the Heir of David's line,
    - whom David Lord did call,
    - the God incarnate, Man divine,
    - and crown him Lord of all!
    - the God incarnate, Man divine,
    - and crown him Lord of all!
  - type: verse
    lines:
    - Ye heirs of Israel's chosen race,
    - ye ransomed of the fall,
    - hail him who saves you by his grace,
    - and crown him Lord of all!
    - hail him who saves you by his grace,
    - and crown him Lord of all!
  - type: verse
    lines:
    - Sinners, whose love can ne'er forget
    - the wormwood and the gall,
    - go, spread your trophies at his feet,
    - and crown him Lord of all!
    - go, spread your trophies at his feet,
    - and crown him Lord of all!
  - type: verse
    lines:
    - Let every kindred, every tribe,
    - on this terrestrial ball,
    - to him all majesty ascribe,
    - and crown him Lord of all!
    - to him all majesty ascribe,
    - and crown him Lord of all!
- title: Alleluia! sing to Jesus!
  hymnal_number: '460'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/460 - Alleluia! sing to Jesus!.m4a
  sections:
  - type: verse
    lines:
    - Alleluia! sing to Jesus!
    - his the scepter, his the throne;
    - Alleluia! his the triumph,
    - his the victory alone;
    - Hark! the songs of peaceful Zion
    - thunder like a mighty flood;
    - Jesus out of every nation
    - hath redeemed us by his blood.
  - type: verse
    lines:
    - Alleluia! not as orphans
    - are we left in sorrow now;
    - Alleluia! he is near us,
    - 'faith believes, nor questions how:'
    - though the cloud from sight received him,
    - when the forty days were o'er,
    - shall our hearts forget his promise,
    - '"I am with you evermore"?'
  - type: verse
    lines:
    - Alleluia! Bread of Heaven,
    - thou on earth our food, our stay!
    - Alleluia! here the sinful
    - 'flee to thee from day to day:'
    - Intercessor, friend of sinners,
    - earth's Redeemer, plead for me,
    - where the songs of all the sinless
    - sweep across the crystal sea.
  - type: verse
    lines:
    - Alleluia! King eternal,
    - 'thee the Lord of lords we own:'
    - Alleluia! born of Mary,
    - 'earth thy footstool, heaven thy throne:'
    - thou within the veil hast entered,
    - 'robed in flesh, our great High Priest:'
    - thou on earth both Priest and Victim
    - in the eucharistic feast.
  - type: verse
    lines:
    - Alleluia! sing to Jesus!
    - his the scepter his the throne;
    - Alleluia! his the triumph,
    - his the victory alone;
    - Hark! the songs of holy Zion
    - thunder like a mighty flood;
    - Jesus out of every nation
    - hath redeemed us by his blood.
- title: Led on their way by this triumphant sign
  hymnal_number: '473'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/473 - Led on their way by this triumphant sign [4 verses].m4a
    verses: 4
  sections:
  - type: verse
    lines:
    - Led on their way by this triumphant sign,
    - the hosts of God in conquering ranks combine.
  - type: verse
    lines:
    - Lift high the cross, the love of Christ proclaim
    - till all the world adore his sacred Name.
  - type: verse
    lines:
    - Each new-born servant of the Crucified
    - bears on the brow the seal of him who died. (Chorus)
  - type: verse
    lines:
    - O Lord, once lifted on the glorious tree,
    - as thou hast promised, draw the world to thee. (Chorus)
  - type: verse
    lines:
    - 'So shall our song of triumph ever be:'
    - praise to the Crucified for victory. (Chorus)
- title: Be thou my vision, O Lord of my heart
  hymnal_number: '488'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/488 - Be thou my vision, O Lord of my heart.m4a
  sections:
  - type: verse
    lines:
    - Be thou my vision, O Lord of my heart;
    - all else be nought to me, save that thou art—
    - thou my best thought, by day or by night,
    - waking or sleeping, thy presence my light.
  - type: verse
    lines:
    - Be thou my wisdom, and thou my true word;
    - I ever with thee and thou with me, Lord;
    - thou my great Father; thine own may I be;
    - thou in me dwelling, and I one with thee.
  - type: verse
    lines:
    - High King of heaven, when victory is won,
    - may I reach heaven's joys, bright heaven's Sun!
    - Heart of my heart, whatever befall,
    - still be my vision, O Ruler of all.
- title: I want to walk as a child of the light
  hymnal_number: '490'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/490 - I want to walk as a child of the light.m4a
  sections:
  - type: verse
    lines:
    - 'I want to walk as a child of the light.       I want to follow Jesus.'
    - God set the stars to give light to the world.
    - The star of my life is Jesus.
    - 'Refrain:        In him there is no darkness at all.'
    - The night and the day are both alike.
    - The Lamb is the light of the city of God.
    - Shine in my heart, Lord Jesus.
    - I want to see the brightness of God.
    - I want to look at Jesus.
    - Clear sun of righteousness, shine on my path,
    - and show me the way to the Father. (Refrain)
  - type: verse
    lines:
    - I’m looking for the coming of Christ.
    - I want to be with Jesus.
    - When we have run with patience the race,
    - we shall know the joy of Jesus. (Refrain)
- title: Crown him with many crowns
  hymnal_number: '494'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/494 - Crown him with many crowns.m4a
  sections:
  - type: verse
    lines:
    - Crown him with many crowns,
    - the Lamb upon his throne;
    - Hark! how the heavenly anthem drowns
    - all music but its own;
    - awake, my soul, and sing
    - of him who died for thee,
    - and hail him as thy matchless King
    - through all eternity.
  - type: verse
    lines:
    - Crown him the Son of God
    - before the worlds began,
    - and ye, who tread where he hath trod,
    - crown him the Son of man;
    - who every grief hath known
    - that wrings the human breast,
    - and takes and bears them for his own,
    - that all in him may rest.
  - type: verse
    lines:
    - Crown him the Lord of life,
    - who triumphed over the grave,
    - and rose victorious in the strife
    - for those he came to save;
    - his glories now we sing
    - who died, and rose on high,
    - who died, eternal life to bring,
    - and lives that death may die.
  - type: verse
    lines:
    - Crown him of lords the Lord,
    - who over all doth reign,
    - who once on earth, the incarnate Word,
    - for ransomed sinners slain,
    - now lives in realms of light,
    - where saints with angels sing
    - their songs before him day and night,
    - their God, Redeemer, King.
  - type: verse
    lines:
    - Crown him the Lord of heaven,
    - enthroned in worlds above;
    - crown him the King, to whom is given,
    - the wondrous name of Love.
    - Crown him with many crowns,
    - as thrones before him fall,
    - crown him, ye kings, with many crowns,
    - for he is King of all.
- title: The Church's one foundation
  hymnal_number: '525'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/525 - The Church's one foundation [ORGAN].m4a
    instrument: organ
  sections:
  - type: verse
    lines:
    - The Church\u2019s one foundation
    - is Jesus Christ her Lord;
    - she is his new creation
    - by water and the Word;
    - from heaven he came and sought her
    - to be his holy bride;
    - with his own blood he bought her,
    - and for her life he died.
  - type: verse
    lines:
    - Elect from every nation,
    - yet one o\u2019er all the earth,
    - her charter of salvation,
    - one Lord, one faith, one birth;
    - one holy Name she blesses,
    - partakes one holy food,
    - and to one hope she presses,
    - with every grace endued.
  - type: verse
    lines:
    - Though with a scornful wonder
    - men see her sore oppressed,
    - by schisms rent asunder,
    - by heresies distressed;
    - yet saints their watch are keeping,
    - their cry goes up, \u201cHow long?\u201d
    - and soon the night of weeping
    - shall be the morn of song.
  - type: verse
    lines:
    - Mid toil and tribulation,
    - and tumult of her war,
    - she waits the consummation
    - of peace forevermore;
    - till with the vision glorious
    - her longing eyes are blest,
    - and the great Church victorious
    - shall be the Church at rest.
  - type: verse
    lines:
    - Yet she on earth hath union
    - with God the Three in One,
    - and mystic sweet communion
    - with those whose rest is won.
    - O happy ones and holy!
    - Lord, give us grace that we,
    - like them, the meek and lowly,
    - on high may dwell with thee.
- title: Stand up, stand up, for Jesus
  hymnal_number: '561'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/561 - Stand up, stand up, for Jesus.m4a
  sections:
  - type: verse
    lines:
    - Stand up, stand up, for Jesus,
    - ye soldiers of the cross;
    - lift high his royal banner,
    - it must not suffer loss.
    - From victory unto victory
    - his army shall he lead,
    - till every foe is vanquished
    - and Christ is Lord indeed.
  - type: verse
    lines:
    - Stand up, stand up, for Jesus;
    - the trumpet call obey;
    - forth to the mighty conflict
    - in this his glorious day.
    - Ye that are brave now serve him
    - against unnumbered foes;
    - let courage rise with danger,
    - and strength to strength oppose.
  - type: verse
    lines:
    - Stand up, stand up, for Jesus;
    - stand in his strength alone;
    - the arm of flesh will fail you,
    - ye dare not trust your own.
    - Put on the gospel armor,
    - each piece put on with prayer;
    - where duty calls or danger,
    - be never wanting there.
  - type: verse
    lines:
    - Stand up, stand up, for Jesus;
    - the strife will not be long;
    - this day the noise of battle,
    - the next, the victor\u2019s song.
    - To valiant hearts triumphant,
    - a crown of life shall be;
    - they with the King of glory
    - shall reign eternally.
- title: Eternal Father, strong to save
  hymnal_number: '608'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/608 - Eternal Father, strong to save.m4a
  sections:
  - type: verse
    lines:
    - Eternal Father, strong to save,
    - whose arm hath bound the restless wave,
    - who bidd\u2019st the mighty ocean deep
    - its own appointed limits keep;
    - O hear us when we cry to thee
    - for those in peril on the sea.
  - type: verse
    lines:
    - O Christ, whose voice the waters heard
    - and hushed their raging at thy word,
    - who walkedst on the foaming deep,
    - and calm amidst its rage didst sleep;
    - O hear us when we cry to thee
    - for those in peril on the sea.
  - type: verse
    lines:
    - Most Holy Spirit, who didst brood
    - upon the chaos dark and rude,
    - and bid its angry tumult cease,
    - and give, for wild confusion, peace;
    - O hear us when we cry to thee
    - for those in peril on the sea.
  - type: verse
    lines:
    - O Trinity of love and power,
    - our kindred shield in danger\u2019s hour;
    - from rock and tempest, fire and foe,
    - protect them wheresoe\u2019er they go;
    - thus evermore shall rise to thee
    - glad hymns of praise from land and sea.
- title: How firm a foundation, ye saints of the Lord
  hymnal_number: '636'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/636 - How firm a foundation, ye saints of the Lord.m4a
  sections:
  - type: verse
    lines:
    - How firm a foundation, ye saints of the Lord,
    - is laid for your faith in his excellent word!
    - What more can he say than to you he hath said,
    - to you that for refuge to Jesus have fled?
  - type: verse
    lines:
    - '"Fear not, I am with thee; O be not dismayed!'
    - For I am thy God, and will still give thee aid;
    - I'll strengthen thee, help thee, and cause thee to stand,
    - upheld by my righteous, omnipotent hand.
  - type: verse
    lines:
    - '"When through the deep waters I call thee to go,'
    - the rivers of woe shall not thee overflow;
    - for I will be with thee, thy troubles to bless,
    - and sanctify to thee thy deepest distress.
  - type: verse
    lines:
    - '"When through fiery trials thy pathway shall lie,'
    - my grace, all sufficient, shall be thy supply;
    - the flame shall not hurt thee; I only design
    - thy dross to consume, and thy gold to refine.
  - type: verse
    lines:
    - '"The soul that to Jesus hath fled for repose,'
    - I will not, I will not desert to its foes;
    - that soul, though all hell shall endeavor to shake,
    - I'll never, no, never, no, never forsake."
- title: Love divine, all loves excelling
  hymnal_number: '657'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/657 - Love divine, all loves excelling.m4a
  sections:
  - type: verse
    lines:
    - Love divine, all loves excelling,
    - joy of heaven, to earth come down,
    - fix in us thy humble dwelling,
    - all thy faithful mercies crown.
    - Jesus, thou art all compassion,
    - pure, unbounded love thou art;
    - visit us with thy salvation,
    - enter every trembling heart.
  - type: verse
    lines:
    - Come, almighty to deliver,
    - let us all thy life receive;
    - suddenly return, and never,
    - nevermore thy temples leave.
    - Thee we would be alway blessing,
    - serve thee as thy hosts above,
    - pray, and praise thee without ceasing,
    - glory in thy perfect love.
  - type: verse
    lines:
    - Finish then thy new creation;
    - pure and spotless let us be;
    - let us see thy great salvation
    - 'perfectly restored in thee:'
    - changed from glory into glory,
    - till in heaven we take our place,
    - till we cast our crowns before thee,
    - lost in wonder, love, and praise.
- title: Amazing grace! how sweet the sound
  hymnal_number: '671'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/671 - Amazing grace! how sweet the sound.m4a
  sections:
  - type: verse
    lines:
    - Amazing grace! how sweet the sound,
    - that saved a wretch like me!
    - I once was lost but now am found,
    - was blind but now I see.
  - type: verse
    lines:
    - '''Twas grace that taught my heart to fear,'
    - and grace my fears relieved;
    - how precious did that grace appear
    - the hour I first believed!
  - type: verse
    lines:
    - The Lord has promised good to me,
    - his word my hope secures;
    - he will my shield and portion be
    - as long as life endures.
  - type: verse
    lines:
    - Through many dangers, toils, and snares,
    - I have already come;
    - '''tis grace that brought me safe thus far,'
    - and grace will lead me home.
  - type: verse
    lines:
    - When we've been there ten thousand years,
    - bright shining as the sun,
    - we've no less days to sing God's praise
    - than when we'd first begun.
- title: Come, thou fount of every blessing
  hymnal_number: '686'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/686 - Come, thou fount of every blessing.m4a
  sections:
  - type: verse
    lines:
    - Come, thou fount of every blessing,
    - tune my heart to sing thy grace!
    - Streams of mercy never ceasing,
    - call for songs of loudest praise.
    - Teach me some melodious sonnet,
    - sung by flaming tongues above.
    - Praise the mount! Oh, fix me on it,
    - mount of God's unchanging love.
  - type: verse
    lines:
    - Here I find my greatest treasure;
    - hither by thy help, I've come;
    - and I hope, by thy good pleasure,
    - safely to arrive at home.
    - Jesus sought me when a stranger,
    - wandering from the fold of God;
    - he, to rescue me from danger,
    - interposed his precious blood.
  - type: verse
    lines:
    - Oh, to grace how great a debtor
    - daily I'm constrained to be!
    - Let thy goodness, like a fetter,
    - 'bind my wandering heart to thee:'
    - prone to wander, Lord, I feel it,
    - prone to leave the God I love;
    - here's my heart, oh, take and seal it,
    - seal it for thy courts above.
- title: Savior, like a shepherd lead us
  hymnal_number: '708'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/708 - Savior, like a shepherd lead us.m4a
  sections:
  - type: verse
    lines:
    - Savior, like a shepherd lead us;
    - much we need thy tender care;
    - in thy pleasant pastures feed us;
    - for our use thy folds prepare.
    - Blessed Jesus! Blessed Jesus!
    - Thou hast bought us, thine we are.
    - Blessed Jesus! Blessed Jesus!
    - Thou hast bought us, thine we are.
  - type: verse
    lines:
    - Early let us seek thy favor,
    - early let us learn thy will;
    - do thou, Lord, our only Savior,
    - with thy love our bosoms fill.
    - Blessed Jesus! Blessed Jesus!
    - 'Thou hast loved us: love us still.'
    - Blessed Jesus! Blessed Jesus!
    - 'Thou hast loved us: love us still.'
- title: Seek ye first the kingdom of God
  hymnal_number: '711'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/711 - Seek ye first the kingdom of God.m4a
  sections:
  - type: verse
    lines:
    - Seek ye first the kingdom of God
    - and his righteousness,
    - and all these things
    - shall be added unto you–
    - Allelu, alleluia!
  - type: verse
    lines:
    - Man shall not live by bread alone
    - but by every word
    - that proceeds
    - from the mouth of God–
    - Allelu, alleluia!
  - type: verse
    lines:
    - Ask and it shall be given unto you,
    - seek and ye shall find,
    - knock and the door
    - shall be opened unto you–
    - Allelu, alleluia!
  - type: verse
    lines:
    - If any man should want to follow me,
    - let him deny himself,
    - take up his cross
    - and daily follow me–
    - Allelu, alleluia!
- title: My country, 'tis of thee
  hymnal_number: '717'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/717 - My country, 'tis of thee.m4a
  sections:
  - type: verse
    lines:
    - My country, \u2019tis of thee,
    - sweet land of liberty,
    - of thee I sing;
    - land where my fathers died,
    - land of the pilgrims\u2019 pride,
    - from every mountainside
    - let freedom ring!
  - type: verse
    lines:
    - My native country, thee,
    - land of the noble free,
    - thy name I love;
    - I love thy rocks and rills,
    - thy woods and templed hills;
    - my heart with rapture thrills,
    - like that above.
  - type: verse
    lines:
    - Let music swell the breeze,
    - and ring from all the trees
    - sweet freedom\u2019s song;
    - let mortal tongues awake;
    - let all that breathe partake;
    - let rocks their silence break,
    - the sound prolong.
  - type: verse
    lines:
    - Our fathers\u2019 God, to thee,
    - author of liberty,
    - to thee we sing;
    - long may our land be bright
    - with freedom\u2019s holy light;
    - protect us by thy might,
    - great God, our King.
- title: God of our fathers, whose almighty hand
  hymnal_number: '718'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/718 - God of our fathers, whose almighty hand.m4a
  sections:
  - type: verse
    lines:
    - God of our fathers, whose almighty hand
    - Leads forth in beauty all the starry band
    - Of shining worlds in splendor through the skies,
    - Our grateful songs before Thy throne arise.
  - type: verse
    lines:
    - Thy love divine hath led us in the past,
    - In this free land by Thee our lot is cast;
    - Be Thou our ruler, guardian, guide and stay,
    - Thy Word our law, Thy paths our chosen way.
  - type: verse
    lines:
    - From war's alarms, from deadly pestilence,
    - Be Thy strong arm our ever sure defense;
    - Thy true religion in our hearts increase,
    - Thy bounteous goodness nourish us in peace.
  - type: verse
    lines:
    - Refresh Thy people on their toilsome way,
    - Lead us from night to never-ending day;
    - Fill all our lives with love and grace divine,
    - And glory, laud, and praise be ever Thine.
- title: O beautiful for spacious skies
  hymnal_number: '719'
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/719 - O beautiful for spacious skies.m4a
  sections:
  - type: verse
    lines:
    - O beautiful for spacious skies,
    - for amber waves of grain;
    - for purple mountain majesties
    - above the fruited plain!
    - America! America!
    - God shed his grace on thee,
    - and crown thy good with brotherhood
    - from sea to shining sea.
  - type: verse
    lines:
    - O beautiful for heroes proved
    - in liberating strife,
    - who more than self their country loved,
    - and mercy more than life!
    - America! America!
    - God mend thine every flaw,
    - confirm thy soul in self-control,
    - thy liberty in law.
  - type: verse
    lines:
    - O beautiful for patriot dream
    - that sees beyond the years
    - thine alabaster cities gleam,
    - undimmed by human tears!
    - America! America!
    - God shed his grace on thee,
    - and crown thy good with brotherhood
    - from sea to shining sea.
- title: Take my life, and let it be
  category: hymnal
  aac_files:
  - filename: Hymnal 1982/Take my life, and let it be.m4a
  sections:
  - type: verse
    lines:
    - Take my life, and let it be
    - consecrated, Lord, to thee;
    - take my moments and my days,
    - let them flow in ceaseless praise.
    - Take my hands, and let them move
    - at the impulse of thy love;
    - take my heart, it is thine own;
    - it shall be thy royal throne.
  - type: chorus
    lines:
    - Here am I, all of me.
    - Take my life, it's all for Thee.
  - type: verse
    lines:
    - Take my voice, and let me sing
    - always, only, for my King;
    - Take my intellect, and use
    - every power as thou shalt choose.
    - Take my will and make it thine;
    - it shall be no longer mine.
    - Take myself, and I will be
    - ever, only, all for thee.
- title: Ancient words, ever true
  category: prelude_postlude
  no_lyrics: true
  aac_files:
  - filename: Other/Ancient words, ever true.m4a
- title: At the cross, at the cross where I first saw the light
  category: other
  aac_files:
  - filename: Other/At the cross, at the cross where I first saw the light.m4a
  sections:
  - type: verse
    lines:
    - Alas! and did my Savior bleed,
    - and did my Sovereign die!
    - Would he devote that sacred head
    - for sinners such as I?
  - type: chorus
    lines:
    - At the cross, at the cross where I first saw the light,
    - and the burden of my heart rolled away,
    - it was there by faith I received my sight,
    - and now I am happy all the day!
  - type: verse
    lines:
    - Was it for crimes that I had done
    - he groaned upon the tree?
    - Amazing pity! Grace unknown!
    - And love beyond degree!
  - type: verse
    lines:
    - But drops of grief can ne\u2019er repay
    - the debt of love I owe;
    - Dear Lord, I give myself away\u2014
    - \u2019tis all that I can do!
- title: Blessed assurance, Jesus is mine
  category: other
  aac_files:
  - filename: Other/Blessed assurance, Jesus is mine.m4a
  sections:
  - type: verse
    lines:
    - Blessed assurance, Jesus is mine!
    - Oh, what a foretaste of glory divine!
    - Heir of salvation, purchase of God,
    - Born of His Spirit, washed in His blood.
  - type: chorus
    lines:
    - This is my story, this is my song,
    - praising my Savior all the day long.
    - This is my story, this is my song,
    - praising my Savior all the day long.
  - type: verse
    lines:
    - Perfect submission, perfect delight,
    - 'Visions of rapture now burst on my sight:'
    - Angels descending bring from above
    - Echoes of mercy, whispers of love.
  - type: verse
    lines:
    - Perfect submission, all is at rest,
    - I in my Savior am happy and blest;
    - Watching and waiting, looking above,
    - Filled with His goodness, lost in His love.
- title: By our love, by our love
  category: other
  aac_files:
  - filename: Other/By our love, by our love.m4a
  sections:
  - type: verse
    lines:
    - We are one in the Spirit,
    - we are one in the Lord,
    - we are one in the Spirit,
    - we are one in the Lord,
    - and we pray that all unity
    - may one day be restored.
  - type: chorus
    lines:
    - And they\u2019ll know we are Christians
    - by our love, by our love;
    - yes, they\u2019ll know we are Christians
    - by our love.
  - type: verse
    lines:
    - We will walk with each other,
    - we will walk hand in hand,
    - we will walk with each other,
    - we will walk hand in hand,
    - and together we\u2019ll spread the news
    - that God is in our land.
  - type: verse
    lines:
    - We will work with each other,
    - we will work side by side,
    - we will work with each other,
    - we will work side by side,
    - and we\u2019ll guard each one\u2019s dignity
    - and save each one\u2019s pride.
  - type: verse
    lines:
    - All praise to the Father,
    - from whom all things come,
    - and all praise to Christ Jesus,
    - his only Son,
    - and all praise to the Spirit,
    - who makes us one.
- title: Chimes
  category: other
  no_lyrics: true
  aac_files:
  - filename: Other/Chimes.m4a
- title: Every promise
  category: other
  aac_files:
  - filename: Other/Every promise.m4a
  sections:
  - type: verse
    lines:
    - From the breaking of the dawn to the setting of the sun,
    - I will stand on every promise of your word.
    - Words of power, strong to save, that will never pass away;
    - I will stand on every promise of your word.
    - For your covenant is sure, and on this I am secure;
    - I can stand on every promise from your word.
  - type: verse
    lines:
    - Hope that lifts me from despair, love that casts out every fear,
    - as I stand on every promise of your word.
    - Not forsaken, not alone; for the Comforter has come,
    - and I stand on every promise of your word.
    - Grace sufficient; grace for me; grace for all who will believe.
    - We will stand on every promise of your word.
- title: God Bless America
  category: other
  no_lyrics: true
  aac_files:
  - filename: Other/God Bless America.m4a
- title: Happy Birthday
  category: other
  no_lyrics: true
  aac_files:
  - filename: Other/Happy Birthday.m4a
- title: Here I am, Lord
  category: other
  aac_files:
  - filename: Other/Here I am, Lord.m4a
  sections:
  - type: verse
    lines:
    - I, the Lord of sea and sky,
    - I have heard my people cry.
    - All who dwell in deepest sin
    - my hand will save.
    - I who made the stars of night,
    - I will make their darkness bright.
    - Who will bear my light to them?
    - Whom shall I send?
  - type: chorus
    lines:
    - Here I am, Lord.
    - Is it I, Lord?
    - I have heard you calling in the night.
    - I will go, Lord,
    - if you lead me,
    - I will hold your people in my heart.
  - type: verse
    lines:
    - I, the Lord of snow and rain,
    - I have borne my people's pain.
    - I have wept for love of them.
    - They turn away.
    - I will break their hearts of stone,
    - give them hearts for love alone.
    - I will speak my word to them.
    - Whom shall I send?
  - type: verse
    lines:
    - I, the Lord of wind and flame,
    - I will tend the poor and lame.
    - I will set a feast for them.
    - My hand will save.
    - Finest bread I will provide
    - till their hearts be satisfied.
    - I will give my life to them.
    - Whom shall I send?
- title: His eye is on the sparrow
  category: other
  aac_files:
  - filename: Other/His eye is on the sparrow.m4a
- title: How great thou art
  category: other
  aac_files:
  - filename: Other/How great thou art [4 verses].m4a
    verses: 4
  sections:
  - type: verse
    lines:
    - O Lord my God,
    - when I in awesome wonder
    - consider all
    - the worlds thy hands have made
    - I see the stars,
    - I hear the rolling thunder,
    - thy power throughout
    - the universe displayed!
  - type: chorus
    lines:
    - 'Then sings my soul, my Savior God, to Thee:'
    - How great thou art, how great thou art!
    - 'Then sings my soul, my Savior God, to Thee:'
    - How great thou art, how great thou art!
  - type: verse
    lines:
    - When thru the woods
    - and forest glades I wander
    - and hear the birds
    - sing sweetly in the trees,
    - when I look down
    - from lofty mountain grandeur
    - and hear the brook
    - and feel the gentle breeze.
  - type: verse
    lines:
    - And when I think
    - that God, his Son not sparing,
    - sent him to die,
    - I scarce can take it in—
    - that on the cross,
    - my burden gladly bearing,
    - he bled and died
    - to take away from sin!
  - type: verse
    lines:
    - When Christ shall come
    - with shout of acclamation
    - and take me home,
    - what joy shall fill my heart!
    - Then I shall bow
    - in humble adoration
    - and there proclaim,
    - my God, how great thou art!
