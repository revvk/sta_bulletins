lines:
- part: Narrator
  text: Now Jesus stood before the governor; and the governor asked him,
- part: Pilate
  text: “Are you the King of the Jews?”
- part: Narrator
  text: Jesus said,
- part: Jesus
  text: “You say so.”
- part: Narrator
  text: But when he was accused by the chief priests and elders, he did not answer. Then Pilate said to him,
- part: Pilate
  text: “Do you not hear how many accusations they make against you?”
- part: Narrator
  text: But Jesus gave him no answer, not even to a single charge, so that the governor was greatly amazed. Now at the festival the governor was accustomed to release a prisoner for the crowd, anyone whom
    they wanted. At that time they had a notorious prisoner, called Jesus Barabbas. So after they had gathered, Pilate said to the crowd,
- part: Pilate
  text: “Whom do you want me to release for you, Jesus Barabbas or Jesus who is called the Messiah?”
- part: Narrator
  text: For Pilate realized that it was out of jealousy that the Chief Priests and the elders had handed Jesus over. While Pilate was sitting on the judgment seat, his wife sent word to him,
- part: Wife
  text: “Have nothing to do with that innocent man, for today I have suffered a great deal because of a dream about him.”
- part: Narrator
  text: Now the chief priests and the elders persuaded the crowds to ask for Barabbas and to have Jesus killed. The governor again said to them,
- part: Pilate
  text: “Which of the two do you want me to release for you?”
- part: Narrator
  text: And the crowd said,
- part: Servant 1
  text: “Barabbas.”
- part: Narrator
  text: Pilate said to them,
- part: Pilate
  text: “Then what should I do with Jesus who is called the Messiah?”
- part: Narrator
  text: All of them said,
- part: Servant 2
  text: “Let him be crucified!”
- part: Narrator
  text: Then Pilate asked,
- part: Pilate
  text: “Why, what evil has he done?”
- part: Narrator
  text: But they shouted all the more,
- part: Servant 1
  text: “Let him be crucified!”
- part: Narrator
  text: So when Pilate saw that he could do nothing, but rather that a riot was beginning, he took some water and washed his hands before the crowd, saying,
- part: Pilate
  text: “I am innocent of this man’s blood; see to it yourselves.”
- part: Narrator
  text: Then the people as a whole answered,
- part: Servant 2
  text: “His blood be on us and on our children!”
- part: Narrator
  text: So Pilate released Barabbas for them; and after flogging Jesus, he handed him over to be crucified. Then the soldiers of the governor took Jesus into the governor’s headquarters, and they gathered
    the whole cohort around him. They stripped Jesus and put a scarlet robe on him, and after twisting some thorns into a crown, they put it on his head. They put a reed in his right hand and knelt before
    him and mocked him, saying,
- part: Soldier
  text: “Hail, King of the Jews!”
- part: Narrator
  text: They spat on Jesus, and took the reed and struck him on the head. After mocking him, they stripped him of the robe and put his own clothes on him. Then they led him away to crucify him. As they
    went out, the soldiers came upon a man from Cyrene named Simon; they compelled this man to carry Jesus’ cross.
- part: Rubric
  text: All stand.
- part: Narrator
  text: And when the soldiers came to a place called Golgotha (which means Place of a Skull), they offered Jesus wine to drink, mixed with gall; but when he tasted it, he would not drink it. And when the
    soldiers had crucified Jesus, they divided his clothes among themselves by casting lots; then they sat down there and kept watch over him. Over Jesus’ head they put the charge against him, which read,
- part: Soldier
  text: “This is Jesus, the King of the Jews.”
- part: Narrator
  text: Then two bandits were crucified with him, one on his right and one on his left. Those who passed by derided him, shaking their heads and saying,
- part: Passerby 1
  text: “You who would destroy the temple and build it in three days, save yourself!
- part: Passerby 2
  text: If you are the Son of God, come down from the cross.”
- part: Narrator
  text: In the same way the chief priests also, along with the scribes and elders, were mocking Jesus, saying,
- part: Chief Priest
  text: “He saved others; he cannot save himself.
- part: Scribe
  text: He is the King of Israel; let him come down from the cross now, and we will believe in him.
- part: Elder
  text: He trusts in God; let God deliver him now, if God wants to; for this man said, ‘I am God’s Son.’”
- part: Narrator
  text: The bandits who were crucified with Jesus also taunted him in the same way. From noon on, darkness came over the whole land until three in the afternoon. And about three o’clock Jesus cried with
    a loud voice,
- part: Jesus
  text: “Eli, Eli, lema sabachthani?”
- part: Narrator
  text: that is,
- part: Jesus
  text: “My God, my God, why have you forsaken me?”
- part: Narrator
  text: When some of the bystanders heard it, they said,
- part: Bystander 1
  text: “This man is calling for Elijah.”
- part: Narrator
  text: At once one of them ran and got a sponge, filled it with sour wine, put it on a stick, and gave it to him to drink. But the others said,
- part: Bystander 2
  text: “Wait, let us see whether Elijah will come to save him.”
- part: Narrator
  text: Then Jesus cried again with a loud voice and breathed his last. At that moment the curtain of the temple was torn in two, from top to bottom. The earth shook, and the rocks were split. The tombs
    also were opened, and many bodies of the saints who had fallen asleep were raised. After his resurrection they came out of the tombs and entered the holy city and appeared to many. Now when the centurion
    and those with him, who were keeping watch over Jesus, saw the earthquake and what took place, they were terrified and said,
- part: Centurion
  text: “Truly this man was God’s Son!”
liturgical_year: A
reference: Matthew 27:11-54
