# Palm Sunday — The Sunday of the Passion
# BCP pp. 270-273
#
# The Liturgy of the Palms precedes the standard Word of God.
# The Palm Gospel varies by liturgical year:
#   A — Matthew 21:1-11
#   B — Mark 11:1-11a (or John 12:12-19)
#   C — Luke 19:28-40
# The Passion Gospel is read in parts; those are stored separately
# in passion_gospel_a.yaml, etc.

liturgy_of_the_palms:
  gathering_rubric: >-
    After getting their palms, the congregation will gather at the
    designated spot forming a processional route back towards the church.

  # Opening acclamation — same for all years
  acclamation:
    celebrant: "Blessed is the King who comes in the name of the Lord."
    people: "Peace in heaven and glory in the highest."

  collect: >-
    Assist us mercifully with your help, O Lord God of our salvation,
    that we may enter with joy upon the contemplation of those mighty
    acts, whereby you have given us life and immortality; through
    Jesus Christ our Lord. Amen.

  # Palm Gospel references by liturgical year
  palm_gospel:
    A: "Matthew 21:1-11"
    B: "Mark 11:1-11a"
    C: "Luke 19:28-40"

  # Blessing of the palms (after the Palm Gospel)
  blessing_dialogue:
    - celebrant: "The Lord be with you."
    - people: "And also with you."
    - celebrant: "Let us give thanks to the Lord our God."
    - people: "It is right to give him thanks and praise."

  blessing_prayer: >-
    It is right to praise you, Almighty God, for the acts of love by
    which you have redeemed us through your Son Jesus Christ our Lord.
    On this day he entered the holy city of Jerusalem in triumph, and
    was proclaimed as King of kings by those who spread their garments
    and branches of palm along his way. Let these branches be for us
    signs of his victory, and grant that we who bear them in his name
    may ever hail him as our King, and follow him in the way that
    leads to eternal life; who lives and reigns in glory with you and
    the Holy Spirit, now and for ever. Amen.

  blessing_response:
    celebrant: "Blessed is he who comes in the name of the Lord. ✠"
    people: "Hosanna in the highest."

  # Procession
  procession:
    rubric: >-
      The procession will follow the cross; as the end of the
      procession passes by you, join in at the end.
    deacon: "Let us go forth in peace."
    people: "In the name of Christ. Amen."

passion_gospel:
  # Rubric before the passion reading
  seating_rubric: >-
    The congregation may be seated for the first part of the Passion.
    At the verse which mentions the arrival at Golgotha all stand.
  announcement: "The Passion of our Lord Jesus Christ according to {gospel_book}."
  omission_rubric: "The customary responses before and after the Gospel are omitted."

  # Passion Gospel references by year (the multi-voice text)
  # These reference the separate passion_gospel_X.yaml files
  references:
    A: "Matthew 27:11-54"
    B: "Mark 15:1-39"
    C: "Luke 23:1-49"
