# Eucharistic Prayers from the Book of Common Prayer
#
# Rite II prayers (A, B, C, D)  : BCP pp. 361-375 — bare top-level keys
#                                 (sursum_corda, preface_opening,
#                                  sanctus_transition, prayer_a/b/c/d).
# Rite I  prayers (I, II)       : BCP pp. 333-343 — keys suffixed
#                                 _rite_i  (sursum_corda_rite_i,
#                                 preface_opening_rite_i,
#                                 sanctus_rite_i,
#                                 sanctus_transition_rite_i,
#                                 prayer_i, prayer_ii).
#
# The Sursum Corda and Sanctus are shared within a rite (Prayers A and B
# share the Rite II preface_opening / sanctus_transition; Prayers I and II
# share the Rite I versions). The Proper Preface is inserted between the
# opening and the Sanctus transition for prayers that take one.

# ============================================================
# Rite II shared elements
# ============================================================

sursum_corda:
  - celebrant: "The Lord be with you."
    people: "And also with you."
  - celebrant: "Lift up your hearts."
    people: "We lift them to the Lord."
  - celebrant: "Let us give thanks to the Lord our God."
    people: "It is right to give him thanks and praise."

# The opening sentence is the same for Prayers A and B (Rite II)
preface_opening: >-
  It is right, and a good and joyful thing, always and everywhere
  to give thanks to you, Father Almighty, Creator of heaven and earth.

# The transition to the Sanctus is the same for Prayers A and B (Rite II)
sanctus_transition: >-
  Therefore we praise you, joining our voices with Angels and Archangels
  and with all the company of heaven, who for ever sing this hymn
  to proclaim the glory of your Name:

# ============================================================
# Rite I shared elements  (BCP pp. 333-334, 340-341)
# ============================================================

sursum_corda_rite_i:
  - celebrant: "The Lord be with you."
    people: "And with thy spirit."
  - celebrant: "Lift up your hearts."
    people: "We lift them up unto the Lord."
  - celebrant: "Let us give thanks unto our Lord God."
    people: "It is meet and right so to do."

# The opening sentence is the same for Prayers I and II (Rite I).
# Followed by the Proper Preface insert, then sanctus_transition_rite_i.
preface_opening_rite_i: >-
  It is very meet, right, and our bounden duty, that we should at all
  times, and in all places, give thanks unto thee, O Lord, holy Father,
  almighty, everlasting God.

# The transition to the Sanctus is the same for Prayers I and II (Rite I).
sanctus_transition_rite_i: >-
  Therefore with Angels and Archangels, and with all the company of
  heaven, we laud and magnify thy glorious Name; evermore praising
  thee, and saying,

# Sanctus  (Rite I) — used by both Prayer I and Prayer II.
# Note the "Glory be to thee, O Lord Most High" closing line is unique
# to Rite I (Rite II's Sanctus closes with "Hosanna in the highest"
# instead). The Benedictus ("Blessed is he that cometh…") is OPTIONAL
# in Rite I — the BCP rubric says "Here may be added" — and is
# typically printed in italic or in brackets in service bulletins.
sanctus_rite_i:
  rubric: "Celebrant and People"
  body:
    - "Holy, holy, holy, Lord God of Hosts:"
    - "Heaven and earth are full of thy glory."
    - "Glory be to thee, O Lord Most High."
  optional_benedictus_rubric: "Here may be added"
  optional_benedictus:
    - "Blessed is he that cometh in the name of the Lord."
    - "Hosanna in the highest."

# --- Prayer A (BCP pp. 361-365) ---
prayer_a:
  post_sanctus: >-
    Holy and gracious Father: In your infinite love you made us for yourself;
    and, when we had fallen into sin and become subject to evil and death,
    you, in your mercy, sent Jesus Christ, your only and eternal Son,
    to share our human nature, to live and die as one of us, to reconcile us
    to you, the God and Father of all.

  institution_1: >-
    He stretched out his arms upon the cross, and offered himself in obedience
    to your will, a perfect sacrifice for the whole world.

  institution_bread: >-
    On the night he was handed over to suffering and death, our Lord Jesus
    Christ took bread; and when he had given thanks to you, he broke it,
    and gave it to his disciples, and said, "Take, eat: This is my Body,
    which is given for you. Do this for the remembrance of me." ✠

  institution_cup: >-
    After supper he took the cup of wine; and when he had given thanks,
    he gave it to them, and said, "Drink this, all of you: This is my Blood
    of the new Covenant, which is shed for you and for many for the
    forgiveness of sins. Whenever you drink it, do this for the
    remembrance of me." ✠

  memorial_intro: "Therefore we proclaim the mystery of faith:"

  memorial_acclamation:
    - "Christ has died."
    - "Christ is risen."
    - "Christ will come again."

  epiclesis_1: >-
    We celebrate the memorial of our redemption, O Father, in this sacrifice
    of praise and thanksgiving. Recalling his death, resurrection, and ascension,
    we offer you these gifts.

  epiclesis_2: >-
    Sanctify them by your Holy Spirit to be for your people the Body and Blood
    of your Son, the holy food and drink of new and unending life in him.
    Sanctify us also ✠ that we may faithfully receive this holy Sacrament,
    and serve you in unity, constancy, and peace; and at the last day bring us
    with all your saints into the joy of your eternal kingdom.

  doxology: >-
    All this we ask through your Son Jesus Christ. By him, and with him,
    and in him, in the unity of the Holy Spirit all honor and glory is yours,
    Almighty Father, now and for ever.

  doxology_response: "AMEN."

# --- Prayer B (BCP pp. 367-369) ---
prayer_b:
  post_sanctus: >-
    We give thanks to you, O God, for the goodness and love which you have
    made known to us in creation; in the calling of Israel to be your people;
    in your Word spoken through the prophets; and above all in the Word made
    flesh, Jesus, your Son. For in these last days you sent him to be incarnate
    from the Virgin Mary, to be the Savior and Redeemer of the world.
    In him, you have delivered us from evil, and made us worthy to stand
    before you. In him, you have brought us out of error into truth,
    out of sin into righteousness, out of death into life.

  institution_bread: >-
    On the night before he died for us, our Lord Jesus Christ took bread;
    and when he had given thanks to you, he broke it, and gave it to his
    disciples, and said, "Take, eat: This is my Body, which is given for you.
    Do this for the remembrance of me." ✠

  institution_cup: >-
    After supper he took the cup of wine; and when he had given thanks,
    he gave it to them, and said, "Drink this, all of you: This is my Blood
    of the new Covenant, which is shed for you and for many for the forgiveness
    of sins. Whenever you drink it, do this for the remembrance of me." ✠

  memorial_intro: "Therefore, according to his command, O Father,"

  memorial_acclamation:
    - "We remember his death,"
    - "We proclaim his resurrection,"
    - "We await his coming in glory;"

  epiclesis: >-
    And we offer our sacrifice of praise and thanksgiving to you, O Lord of all;
    presenting to you, from your creation, this bread and this wine.

  epiclesis_2: >-
    We pray you, gracious God, to send your Holy Spirit upon these gifts that
    they may be the Sacrament of the Body of Christ and his Blood of the
    new Covenant. Unite us to your Son in his sacrifice, that we may be
    acceptable through him, being sanctified by the Holy Spirit ✠. In the fullness
    of time, put all things in subjection under your Christ, and bring us to
    that heavenly country where, with Saint Andrew and all your saints, we may
    enter the everlasting heritage of your sons and daughters; through Jesus
    Christ our Lord, the firstborn of all creation, the head of the Church,
    and the author of our salvation.

  doxology: >-
    By him, and with him, and in him, in the unity of the Holy Spirit
    all honor and glory is yours, Almighty Father, now and for ever.

  doxology_response: "AMEN."

# --- Prayer C (BCP pp. 369-372) ---
# Prayer C has a unique responsive structure; included for completeness
prayer_c:
  note: "Prayer C is responsive throughout. See BCP pp. 369-372."
  # Full text to be added when needed

# --- Prayer D (BCP pp. 372-376) ---
# Prayer D has its own preface (does NOT take a Proper Preface insert
# like A and B do) and its own Sanctus shape ("Hosanna in the highest"
# is set on a separate line indented under each Holy line). The post-
# sanctus thanksgiving is also longer than A or B and includes a
# distinct intercession block before the doxology — including an
# optional bracketed section where specific names can be added.
#
# All text below is transcribed verbatim from the 1979 BCP (public
# domain). Built up paragraph-by-paragraph for review.
prayer_d:
  preface_rubric: "Then, facing the Holy Table, the Celebrant proceeds"

  preface_1: >-
    It is truly right to glorify you, Father, and to give you thanks;
    for you alone are God, living and true, dwelling in light
    inaccessible from before time and for ever.

  preface_2: >-
    Fountain of life and source of all goodness, you made all things
    and fill them with your blessing; you created them to rejoice in
    the splendor of your radiance.

  # The third preface paragraph is the transition into the Sanctus —
  # the renderer follows it directly with the Sanctus dialogue, no
  # spacer between.
  preface_3: >-
    Countless throngs of angels stand before you to serve you night
    and day; and, beholding the glory of your presence, they offer
    you unceasing praise. Joining with them, and giving voice to
    every creature under heaven, we acclaim you, and glorify your
    Name, as we sing (say),

  # Sanctus  (BCP p. 373) — Prayer D specific layout.
  # "Hosanna in the highest." lines sit on their own line, indented
  # under the holy/blessed line they follow. The renderer iterates
  # `lines` and applies an extra indent when `indent: true`.
  sanctus:
    rubric: "Celebrant and People"
    lines:
      - text: "Holy, holy, holy Lord, God of power and might,"
      - text: "heaven and earth are full of your glory."
      - text: "Hosanna in the highest."
        indent: true
      - text: "Blessed is he who comes in the name of the Lord."
      - text: "Hosanna in the highest."
        indent: true

  post_sanctus_rubric_1: "The people stand or kneel."
  post_sanctus_rubric_2: "Then the Celebrant continues"

  post_sanctus_1: >-
    We acclaim you, holy Lord, glorious in power. Your mighty works
    reveal your wisdom and love. You formed us in your own image,
    giving the whole world into our care, so that, in obedience to
    you, our Creator, we might rule and serve all your creatures.
    When our disobedience took us far from you, you did not abandon
    us to the power of death. In your mercy you came to our help,
    so that in seeking you we might find you. Again and again you
    called us into covenant with you, and through the prophets you
    taught us to hope for salvation.

  post_sanctus_2: >-
    Father, you loved the world so much that in the fullness of time
    you sent your only Son to be our Savior. Incarnate by the Holy
    Spirit, born of the Virgin Mary, he lived as one of us, yet
    without sin. To the poor he proclaimed the good news of
    salvation; to prisoners, freedom; to the sorrowful, joy. To
    fulfill your purpose he gave himself up to death; and, rising
    from the grave, destroyed death, and made the whole creation new.

  post_sanctus_3: >-
    And, that we might live no longer for ourselves, but for him who
    died and rose for us, he sent the Holy Spirit, his own first
    gift for those who believe, to complete his work in the world,
    and to bring to fulfillment the sanctification of all.

  # Hands-on rubric for the institution. Same wording as prayers A/B
  # (matches what's already rendered in those prayers' flow).
  institution_rubric: >-
    At the following words concerning the bread, the Celebrant is to
    hold it or lay a hand upon it; and at the words concerning the
    cup, to hold or place a hand upon the cup and any other vessel
    containing wine to be consecrated.

  # Trailing ✠ matches the prayer_a / prayer_b convention — the
  # renderer uses the cross symbol as a cue for the celebrant.
  institution_bread: >-
    When the hour had come for him to be glorified by you, his
    heavenly Father, having loved his own who were in the world, he
    loved them to the end; at supper with them he took bread, and
    when he had given thanks to you, he broke it, and gave it to his
    disciples, and said, "Take, eat: This is my Body, which is given
    for you. Do this for the remembrance of me." ✠

  # Note the punctuation: Prayer D has "Drink this, all of you." (period)
  # where Prayer A has "Drink this, all of you:" (colon). This is a
  # genuine BCP difference — preserved verbatim.
  institution_cup: >-
    After supper he took the cup of wine; and when he had given
    thanks, he gave it to them, and said, "Drink this, all of you.
    This is my Blood of the new Covenant, which is shed for you and
    for many for the forgiveness of sins. Whenever you drink it, do
    this for the remembrance of me." ✠

  # The memorial intro flows directly into the people's acclamation
  # below — the Celebrant ends mid-thought ("we praise you and we
  # bless you") and the people's lines continue it. The renderer
  # should set them as one unbroken unit with the acclamation in
  # bold (per the existing dialogue style).
  memorial_intro: >-
    Father, we now celebrate this memorial of our redemption.
    Recalling Christ's death and his descent among the dead,
    proclaiming his resurrection and ascension to your right hand,
    awaiting his coming in glory; and offering to you, from the
    gifts you have given us, this bread and this cup, we praise you
    and we bless you.

  memorial_acclamation_rubric: "Celebrant and People"
  memorial_acclamation:
    - "We praise you, we bless you,"
    - "we give thanks to you,"
    - "and we pray to you, Lord our God."

  epiclesis_rubric: "The Celebrant continues"

  epiclesis_1: >-
    Lord, we pray that in your goodness and mercy your Holy Spirit
    may descend upon us, and upon these gifts, sanctifying them and
    showing them to be holy gifts for your holy people, the bread of
    life and the cup of salvation, the Body and Blood of your Son
    Jesus Christ.

  epiclesis_2: >-
    Grant that all who share this bread and cup may become one body
    and one spirit, a living sacrifice in Christ, to the praise of
    your Name.

  # First intercession paragraph (always included).
  intercession_main: >-
    Remember, Lord, your one holy catholic and apostolic Church,
    redeemed by the blood of your Christ. Reveal its unity, guard
    its faith, and preserve it in peace.

  # Four optional bracketed petitions (BCP p. 375). Each is
  # independently optional — the brackets in the BCP indicate that
  # any of these may be omitted. The per-service YAML enables them
  # via flags like:
  #   intercession_petitions:
  #     ministers:  true            # (with names if desired)
  #     ministers_names: ["Michael", "Sean"]
  #     people:     true
  #     specific:   "the residents of Samaritan Inn"   # fills the blank
  #     departed:   true            # the standard "all who have died"
  intercession_optional:
    ministers:
      # The "(NN. and)" parenthetical is filled with name(s) when
      # ministers_names is set; collapsed when empty.
      text_with_names: "Remember {names} and all who minister in your Church."
      text_without_names: "Remember all who minister in your Church."
    people:
      text: "Remember all your people, and those who seek your truth."
    specific:
      # The blank (BCP shows "__________") is for any free-form
      # intercession the celebrant wants to add.
      text: "Remember {free_text}."
    departed:
      text: >-
        Remember all who have died in the peace of Christ, and
        those whose faith is known to you alone; bring them into
        the place of eternal joy and light.

  # Final intercession paragraph. The "saints invocation" middle
  # section is bracketed in the BCP — optional. Per-service flag
  # `include_saints_invocation: true|false` picks which variant.
  # When included, {extra_saints_phrase} can be a parenthetical
  # like "(with blessed Andrew)" or empty.
  intercession_close:
    text_with_saints: >-
      And grant that we may find our inheritance with the Blessed
      Virgin Mary, with patriarchs, prophets, apostles, and martyrs,
      {extra_saints_phrase} and all the saints who have found favor
      with you in ages past. We praise you in union with them and
      give you glory through your Son Jesus Christ our Lord.
    text_without_saints: >-
      And grant that we may find our inheritance with all the saints
      who have found favor with you in ages past. We praise you in
      union with them and give you glory through your Son Jesus
      Christ our Lord.

  doxology: >-
    Through Christ, and with Christ, and in Christ, all honor and
    glory are yours, Almighty God and Father, in the unity of the
    Holy Spirit, for ever and ever.

  doxology_response: "AMEN."

# --- Prayer I (Rite I, BCP pp. 333-340) ---
# Uses the Rite I shared sursum_corda_rite_i, preface_opening_rite_i,
# sanctus_transition_rite_i, and sanctus_rite_i above. Takes a Proper
# Preface insert between the opening and the sanctus_transition (same
# slot as Prayers A and B in Rite II).
#
# Built up paragraph-by-paragraph for review.
prayer_i:
  post_sanctus_rubric_1: "The people kneel or stand."
  post_sanctus_rubric_2: "Then the Celebrant continues"

  post_sanctus_1: >-
    All glory be to thee, Almighty God, our heavenly Father, for that
    thou, of thy tender mercy, didst give thine only Son Jesus Christ
    to suffer death upon the cross for our redemption; who made there,
    by his one oblation of himself once offered, a full, perfect, and
    sufficient sacrifice, oblation, and satisfaction, for the sins of
    the whole world; and did institute, and in his holy Gospel command
    us to continue, a perpetual memory of that his precious death and
    sacrifice, until his coming again.

  # Hands-on rubric for the institution. Same wording as Rite II
  # prayers; preserved here for self-containment of the Rite I block.
  institution_rubric: >-
    At the following words concerning the bread, the Celebrant is to
    hold it, or lay a hand upon it; and at the words concerning the
    cup, to hold or place a hand upon the cup and any other vessel
    containing wine to be consecrated.

  # Trailing ✠ matches the prayer_a / prayer_b / prayer_d convention.
  # Note Rite I differences from Rite II: "brake it" (Rite I) vs
  # "broke it" (Rite II); "saying" (Rite I) vs "and said" (Rite II);
  # "this is my Body, which is given for you" — comma after Body
  # in Rite I where Rite II uses a colon.
  institution_bread: >-
    For in the night in which he was betrayed, he took bread; and
    when he had given thanks, he brake it, and gave it to his
    disciples, saying, "Take, eat, this is my Body, which is given
    for you. Do this in remembrance of me." ✠

  # Rite I differences from Rite II: "Drink ye all of this" vs "Drink
  # this, all of you"; "my Blood of the New Testament" vs "of the new
  # Covenant"; "remission of sins" vs "forgiveness of sins"; "as oft
  # as ye shall drink it" vs "Whenever you drink it".
  institution_cup: >-
    Likewise, after supper, he took the cup; and when he had given
    thanks, he gave it to them, saying, "Drink ye all of this; for
    this is my Blood of the New Testament, which is shed for you, and
    for many, for the remission of sins. Do this, as oft as ye shall
    drink it, in remembrance of me." ✠

  anamnesis: >-
    Wherefore, O Lord and heavenly Father, according to the
    institution of thy dearly beloved Son our Savior Jesus Christ,
    we, thy humble servants, do celebrate and make here before thy
    divine Majesty, with these thy holy gifts, which we now offer
    unto thee, the memorial thy Son hath commanded us to make;
    having in remembrance his blessed passion and precious death,
    his mighty resurrection and glorious ascension; rendering unto
    thee most hearty thanks for the innumerable benefits procured
    unto us by the same.

  epiclesis: >-
    And we most humbly beseech thee, O merciful Father, to hear us;
    and, of thy almighty goodness, vouchsafe to bless and sanctify,
    with thy Word and Holy Spirit, these thy gifts and creatures of
    bread and wine; that we, receiving them according to thy Son our
    Savior Jesus Christ's holy institution, in remembrance of his
    death and passion, may be partakers of his most blessed Body and
    Blood.

  sacrifice: >-
    And we earnestly desire thy fatherly goodness mercifully to
    accept this our sacrifice of praise and thanksgiving; most
    humbly beseeching thee to grant that, by the merits and death
    of thy Son Jesus Christ, and through faith in his blood, we, and
    all thy whole Church, may obtain remission of our sins, and all
    other benefits of his passion.

  self_offering: >-
    And here we offer and present unto thee, O Lord, our selves, our
    souls and bodies, to be a reasonable, holy, and living sacrifice
    unto thee; humbly beseeching thee that we, and all others who
    shall be partakers of this Holy Communion, may worthily receive
    the most precious Body and Blood of thy Son Jesus Christ, be
    filled with thy grace and heavenly benediction, and made one
    body with him, that he may dwell in us, and we in him.

  # Note this paragraph ends with a semicolon (";"), not a period —
  # it leads directly into the doxology that follows. The renderer
  # should NOT print an Amen between unworthiness and doxology.
  unworthiness: >-
    And although we are unworthy, through our manifold sins, to
    offer unto thee any sacrifice, yet we beseech thee to accept
    this our bounden duty and service, not weighing our merits, but
    pardoning our offenses, through Jesus Christ our Lord;

  # Rite I uses "Holy Ghost" (not "Holy Spirit"), "be unto thee"
  # (not "is yours"), and "world without end" (not "now and for
  # ever") — preserved verbatim.
  doxology: >-
    By whom, and with whom, in the unity of the Holy Ghost, all
    honor and glory be unto thee, O Father Almighty, world without
    end.

  doxology_response: "AMEN."

# --- Prayer II (Rite I, BCP pp. 340-343) ---
# Marked in the BCP as "Alternative Form of the Great Thanksgiving."
# Uses the same Rite I shared sursum_corda_rite_i, preface_opening_rite_i,
# sanctus_transition_rite_i, and sanctus_rite_i above. Takes a Proper
# Preface insert between the opening and sanctus_transition.
#
# Structurally similar to Prayer I but shorter — Prayer II has a
# briefer oblation that opens with a creation reference, no separate
# `sacrifice` paragraph, and no `unworthiness` paragraph; the
# anamnesis/self-offering content is condensed into one block.
#
# Built up paragraph-by-paragraph for review.
prayer_ii:
  post_sanctus_rubric_1: "The people kneel or stand."
  post_sanctus_rubric_2: "Then the Celebrant continues"

  # Note Prayer II opens with "All glory be to thee, O Lord our God"
  # (Prayer I opens with "Almighty God, our heavenly Father"), and
  # includes a brief reference to creation that Prayer I omits.
  post_sanctus_1: >-
    All glory be to thee, O Lord our God, for that thou didst create
    heaven and earth, and didst make us in thine own image; and, of
    thy tender mercy, didst give thine only Son Jesus Christ to take
    our nature upon him, and to suffer death upon the cross for our
    redemption. He made there a full and perfect sacrifice for the
    whole world; and did institute, and in his holy Gospel command
    us to continue, a perpetual memory of that his precious death
    and sacrifice, until his coming again.

  # Hands-on rubric for the institution. Same wording as Prayer I.
  institution_rubric: >-
    At the following words concerning the bread, the Celebrant is to
    hold it, or lay a hand upon it; and at the words concerning the
    cup, to hold or place a hand upon the cup and any other vessel
    containing wine to be consecrated.

  # Note differences from Prayer I:
  #   "given thanks to thee" (Prayer II) vs "given thanks" (Prayer I)
  #   "broke it"             (Prayer II) vs "brake it"     (Prayer I)
  # Trailing ✠ matches the convention used by every other prayer.
  institution_bread: >-
    For in the night in which he was betrayed, he took bread; and
    when he had given thanks to thee, he broke it, and gave it to
    his disciples, saying, "Take, eat, this is my Body, which is
    given for you. Do this in remembrance of me." ✠

  # Prayer II's cup is interesting — it's a transitional form,
  # using Rite II's "Drink this, all of you" and "New Covenant"
  # while keeping Rite I's "remission of sins" and "as oft as ye
  # shall drink it." Compare:
  #   Prayer I:  "Drink ye all of this; for this is my Blood of
  #              the New Testament... for the remission of sins.
  #              Do this, as oft as ye shall drink it..."
  #   Prayer II: "Drink this, all of you; for this is my Blood of
  #              the New Covenant... for the remission of sins.
  #              Do this, as oft as ye shall drink it..."
  institution_cup: >-
    Likewise, after supper, he took the cup; and when he had given
    thanks, he gave it to them, saying, "Drink this, all of you;
    for this is my Blood of the New Covenant, which is shed for
    you, and for many, for the remission of sins. Do this, as oft
    as ye shall drink it, in remembrance of me." ✠

  # Prayer II's anamnesis is shorter than Prayer I's and ends
  # eschatologically ("looking for his coming again with power and
  # great glory") rather than with the thanksgiving close that
  # Prayer I uses ("rendering unto thee most hearty thanks for the
  # innumerable benefits procured unto us by the same").
  anamnesis: >-
    Wherefore, O Lord and heavenly Father, we thy people do
    celebrate and make, with these thy holy gifts which we now
    offer unto thee, the memorial thy Son hath commanded us to
    make; having in remembrance his blessed passion and precious
    death, his mighty resurrection and glorious ascension; and
    looking for his coming again with power and great glory.

  # Prayer II's epiclesis is markedly more direct than Prayer I's —
  # asks for the Spirit to "bless and sanctify these gifts... that
  # they may be unto us the Body and Blood." Prayer I instead asks
  # that "we, receiving them... may be partakers of his most blessed
  # Body and Blood." Prayer II also drops "of thy almighty goodness,
  # vouchsafe" and "thy gifts and creatures." Note "dearly-beloved"
  # is hyphenated in the BCP here.
  epiclesis: >-
    And we most humbly beseech thee, O merciful Father, to hear us,
    and, with thy Word and Holy Spirit, to bless and sanctify these
    gifts of bread and wine, that they may be unto us the Body and
    Blood of thy dearly-beloved Son Jesus Christ.

  # Prayer II merges into one paragraph what Prayer I splits across
  # `sacrifice` and `self_offering`, AND skips an `unworthiness`
  # paragraph entirely. The result ends in a semicolon (";"), not a
  # period — like Prayer I's `unworthiness`, it leads directly into
  # the doxology with no Amen between.
  self_offering: >-
    And we earnestly desire thy fatherly goodness to accept this our
    sacrifice of praise and thanksgiving, whereby we offer and
    present unto thee, O Lord, our selves, our souls and bodies.
    Grant, we beseech thee, that all who partake of this Holy
    Communion may worthily receive the most precious Body and Blood
    of thy Son Jesus Christ, and be filled with thy grace and
    heavenly benediction; and also that we and all thy whole Church
    may be made one body with him, that he may dwell in us, and we
    in him; through the same Jesus Christ our Lord;

  # Prayer II's doxology adds "and in whom" — a triple invocation
  # where Prayer I uses only "By whom, and with whom". Otherwise
  # identical to Prayer I.
  doxology: >-
    By whom, and with whom, and in whom, in the unity of the Holy
    Ghost all honor and glory be unto thee, O Father Almighty,
    world without end.

  doxology_response: "AMEN."
