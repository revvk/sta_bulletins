# Reading Introductions for the Books of the Bible
#
# Maps the book name (as it appears in lectionary reference strings)
# to the descriptive phrase used in the lay reader's introduction.
#
# Usage: "A Reading from {value}:"
# Example: "A Reading from the Book of Exodus:"
#
# Source: "Reading Introductions for the Books of the Bible.docx"

